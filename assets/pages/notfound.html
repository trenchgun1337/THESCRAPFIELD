<style>
@font-face {
  font-family: 'AngelicWar';
  src: url('../../assets/fonts/AngelicWar.ttf') format('truetype');
  font-display: block;
}
.angelic-target { visibility: hidden; }
.fonts-loaded .angelic-target { visibility: visible; }

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
*:focus { outline:none !important; }
::selection { background:rgba(80,80,80,.45); color:#fff; }
img { -webkit-user-drag:none; user-select:none; }

:root {
  --accent: #cc1a1a;
  --text: #111;
  --editor-h: 120px;
}

::-webkit-scrollbar { width:7px; height:4px; }
::-webkit-scrollbar-track { background:#3d3d3d54; }
::-webkit-scrollbar-thumb { background:#d3d3d3; border:2px ridge #b0b0b0; border-radius:0; }
::-webkit-scrollbar-thumb:hover { background:#c0c0c0; }

body {
  font-family:'Sawarabi Gothic','Sazanami Gothic',Tahoma,'Segoe UI',sans-serif;
  font-size:12px;
  background-color:#000;
  background-image:url('../../assets/images/backgrounds/whitebg.jpeg');

  display:flex; flex-direction:column; align-items:center;
}

a { color:#0055cc; text-decoration:underline; }
p { font-size:12.5px; line-height:18px; color:var(--text); margin:0; }

#pageWrap { width:800px; max-width:100%; display:flex; flex-direction:column; gap:7px; }

#cornerLogo img { height:36px; width:auto; opacity:.82; display:block; }
#cornerLogo:hover img { opacity:1; }

/* Top bar — same style as index */
.aero-bar {
  background:linear-gradient(108deg,#f5f5f5 50%,#ececec 100%);
  border:2px ridge #727272;
  box-shadow:#595959 1px 1px 12px 1px;

  display:flex; align-items:center; gap:8px;
}
.back-link {
  color:var(--accent); font-size:11px; letter-spacing:1px;

.bar-title {

/* Section heading */

h1, h2, h3 {

/* Glass container */
.glass-borders {

#removeBtn, #removeEmbedBtn {

.chan-footer-note { font-size:11px; color:#333; margin-top:5px; }

/* Preview — styled like glass-borders */
#previewSection {

  box-shadow:inset 0 1px 0 rgba(255,255,255,.90), 0 5px 6px rgba(0,0,0,.18), #595959 1px 1px 12px 1px;

.chan-post-box { background:#fff; border:1px solid #aaa; padding:8px 10px; display:block; width:100%; overflow:hidden; }
.chan-post-meta { font-size:12px; margin-bottom:6px; line-height:1.4; }
.chan-post-name { color:#117743; font-weight:bold; }

#previewMsg {

.embed-wrap { margin:6px 0; clear:both; }

@media (max-width:800px) { #pageWrap { width:100%; } }

<script>
emailjs.init({ publicKey: 'iww-r-sgJVyoRmokf' });

const CLOUD_NAME    = 'dagsxkazw';
const UPLOAD_PRESET = 'unsigned_upload';
const SERVICE_ID    = 'service_ina2cb8';
const TEMPLATE_ID   = 'template_g7owumb';

function getChanTime() {
  const now  = new Date();
  const mm   = String(now.getMonth()+1).padStart(2,'0');
  const dd   = String(now.getDate()).padStart(2,'0');
  const yy   = String(now.getFullYear()).slice(2);
  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const day  = days[now.getDay()];
  const hh   = String(now.getHours()).padStart(2,'0');
  const min  = String(now.getMinutes()).padStart(2,'0');
  const ss   = String(now.getSeconds()).padStart(2,'0');
  return `${mm}/${dd}/${yy}(${day})${hh}:${min}:${ss}`;
}

const embedPatterns = [
  {
    name:'youtube',
    regex:/https?:\/\/(?:www\.)?(?:youtube\.com\/watch\?(?:[^#&\s]*&)*v=|youtu\.be\/)([a-zA-Z0-9_-]{11})/g,
    build:(m)=>({url:m[0],id:m[1],iframeSrc:`https://www.youtube.com/embed/${m[1]}`,width:'100%',height:'95'})
  },
  {
    name:'spotify',
    regex:/https?:\/\/open\.spotify\.com\/(?:intl-[a-z]{2}\/)?(track|album|playlist|episode)\/([a-zA-Z0-9]+)(?:\?[^\s]*)?/g,
    build:(m)=>({url:m[0],iframeSrc:`https://open.spotify.com/embed/${m[1]}/${m[2]}?utm_source=generator&theme=0`,width:'100%',height:'95'})
  },
  {
    name:'soundcloud',
    regex:/https?:\/\/(?:www\.)?soundcloud\.com\/[a-zA-Z0-9_-]+\/[a-zA-Z0-9_-]+(?:\?[^\s]*)?/g,
    build:(m)=>({url:m[0],iframeSrc:`https://w.soundcloud.com/player/?url=${encodeURIComponent(m[0])}&color=%23ff5500&auto_play=false&hide_related=true&show_comments=false&show_user=true&show_reposts=false&show_teaser=false`,width:'100%',height:'95'})
  }
];

const EMBED_URL_REGEX=/https?:\/\/(?:(?:www\.)?(?:youtube\.com\/watch\?[^\s]*v=[a-zA-Z0-9_-]{11}|youtu\.be\/[a-zA-Z0-9_-]{11})|open\.spotify\.com\/(?:intl-[a-z]{2}\/)?(?:track|album|playlist|episode)\/[a-zA-Z0-9]+(?:\?[^\s]*)?|(?:www\.)?soundcloud\.com\/[a-zA-Z0-9_-]+\/[a-zA-Z0-9_-]+(?:\?[^\s]*)?)/g;

function detectEmbeds(text){
  const found=[];
  for(const pat of embedPatterns){
    pat.regex.lastIndex=0; let m;
    while((m=pat.regex.exec(text))!==null){
      const built=pat.build(m);
      if(!found.some(e=>e.url===built.url)) found.push({...built,name:pat.name});
    }
  }
  return found;
}

function buildEmbedPreviewHTML(embeds){
  if(!embeds.length)return'';
  return embeds.map(e=>`<div class="embed-wrap"><iframe src="${escapeAttr(e.iframeSrc)}" width="${e.width}" height="${e.height}" frameborder="0" allow="autoplay;clipboard-write;encrypted-media;fullscreen;picture-in-picture" allowfullscreen loading="lazy" style="border-radius:0;border:1px solid #ccc;display:block;"></iframe></div>`).join('');
}

function buildEmbedEmailHTML(embeds){
  if(!embeds.length)return'';
  const items=embeds.map(e=>`<div style="margin:4px 0;font-size:12px;">[${e.name.toUpperCase()}] <a href="${escapeAttr(e.url)}" style="color:#0055cc;">${escapeHtml(e.url)}</a></div>`).join('');
  return`<div style="margin-top:8px;padding-top:6px;border-top:1px dotted #ccc;font-size:11px;color:#888;">Embeds:</div>${items}`;
}

function getCaretCharOffset(el){
  const sel=window.getSelection(); if(!sel||!sel.rangeCount)return 0;
  const range=sel.getRangeAt(0).cloneRange(); const preRange=document.createRange();
  preRange.selectNodeContents(el); preRange.setEnd(range.endContainer,range.endOffset);
  return preRange.toString().length;
}

function setCaretByOffset(el,offset){
  const sel=window.getSelection(); if(!sel)return;
  let pos=0,found=false;
  function walk(node){
    if(found)return;
    if(node.nodeType===Node.TEXT_NODE){
      const len=node.textContent.length;
      if(pos+len>=offset){const range=document.createRange();range.setStart(node,offset-pos);range.collapse(true);sel.removeAllRanges();sel.addRange(range);found=true;return;}
      pos+=len;
    }else{for(const child of node.childNodes){walk(child);if(found)return;}}
  }
  walk(el);
  if(!found){const range=document.createRange();range.selectNodeContents(el);range.collapse(false);sel.removeAllRanges();sel.addRange(range);}
}

function unwrapLinkSpans(){
  editor.querySelectorAll('.link-span').forEach(span=>{const parent=span.parentNode;if(!parent)return;while(span.firstChild)parent.insertBefore(span.firstChild,span);parent.removeChild(span);});
  editor.normalize();
}

function highlightLinks(){
  const rawText=editor.textContent.replace(/\u200B/g,'');
  EMBED_URL_REGEX.lastIndex=0; const hasLinks=EMBED_URL_REGEX.test(rawText);
  const hasSpans=!!editor.querySelector('.link-span');
  if(!hasLinks&&!hasSpans)return;
  const caretOffset=getCaretCharOffset(editor); unwrapLinkSpans();
  function processNode(node){
    if(node.nodeType===Node.ELEMENT_NODE){
      if(node.tagName==='IMG'||(node.classList&&(node.classList.contains('pic-specs')||node.classList.contains('link-span'))))return;
      Array.from(node.childNodes).forEach(processNode);
    }else if(node.nodeType===Node.TEXT_NODE){
      EMBED_URL_REGEX.lastIndex=0; if(!EMBED_URL_REGEX.test(node.textContent))return;
      EMBED_URL_REGEX.lastIndex=0; const frag=document.createDocumentFragment(); let lastIndex=0,m; const text=node.textContent;
      while((m=EMBED_URL_REGEX.exec(text))!==null){
        if(m.index>lastIndex)frag.appendChild(document.createTextNode(text.slice(lastIndex,m.index)));
        const span=document.createElement('span'); span.className='link-span'; span.style.color='#0055cc'; span.textContent=m[0]; frag.appendChild(span); lastIndex=m.index+m[0].length;
      }
      if(lastIndex<text.length)frag.appendChild(document.createTextNode(text.slice(lastIndex)));
      if(node.parentNode)node.parentNode.replaceChild(frag,node);
    }
  }
  Array.from(editor.childNodes).forEach(processNode); setCaretByOffset(editor,caretOffset);
}

const editor=document.getElementById('msgEditor');
const previewMsg=document.getElementById('previewMsg');
const previewTime=document.getElementById('previewTime');
const links=[];
const linkInput=document.getElementById('linkInput');
const linkDropdown=document.getElementById('linkDropdown');

linkInput.addEventListener('keydown',(e)=>{
  if(e.key==='Enter'){
    e.preventDefault(); const val=linkInput.value.trim(); if(!val)return;
    if(!links.includes(val))links.push(val);
    linkInput.value=''; renderLinks(); updatePreview();
  }
});

function extractLinksFromEditor(){
  const text=editor.innerText.replace(/\u200B/g,''); const matches=text.match(EMBED_URL_REGEX);
  if(!matches)return; matches.forEach(link=>{if(!links.includes(link))links.push(link);}); renderLinks();
}

function renderLinks(){
  linkDropdown.innerHTML=links.map((l,i)=>`<div style="display:flex;justify-content:space-between;gap:6px;margin-bottom:3px;"><span style="color:#0055cc;overflow:hidden;text-overflow:ellipsis;">${l}</span><button onclick="removeLink(${i})" style="color:red;background:none;border:none;cursor:pointer;">x</button></div>`).join('');
}

function removeLink(i){ links.splice(i,1); renderLinks(); updatePreview(); }

previewTime.textContent=getChanTime();
setInterval(()=>{previewTime.textContent=getChanTime();},1000);

editor.addEventListener('input',()=>{suppressedEmbeds.clear();extractLinksFromEditor();highlightLinks();updatePreview();});
editor.addEventListener('paste',(e)=>{e.preventDefault();const text=e.clipboardData.getData('text/plain');if(text)document.execCommand('insertText',false,text);});
editor.addEventListener('dragstart',(e)=>{if(e.target.tagName==='IMG')e.preventDefault();});

editor.addEventListener('keydown',(e)=>{
  if((e.ctrlKey||e.metaKey)&&e.key==='a'){
    const img=editor.querySelector('img');
    if(img){
      e.preventDefault(); const sel=window.getSelection(); sel.removeAllRanges();
      const textNodes=[];
      function collectTextNodes(node){if(node.nodeType===Node.TEXT_NODE){textNodes.push(node);}else if(node.tagName!=='IMG'&&!(node.classList&&node.classList.contains('pic-specs'))){for(const child of node.childNodes)collectTextNodes(child);}}
      collectTextNodes(editor);
      if(textNodes.length>0){const range=document.createRange();range.setStart(textNodes[0],0);const last=textNodes[textNodes.length-1];range.setEnd(last,last.textContent.length);sel.addRange(range);}
      return;
    }
  }
  if(e.key==='Enter'){
    e.preventDefault(); const sel=window.getSelection(); if(!sel.rangeCount)return;
    const range=sel.getRangeAt(0); range.deleteContents();
    const br=document.createElement('br'); range.insertNode(br);
    range.setStartAfter(br); range.setEndAfter(br); sel.removeAllRanges(); sel.addRange(range); return;
  }
});

editor.addEventListener('click',()=>{
  const img=editor.querySelector('img'); if(!img)return;
  requestAnimationFrame(()=>{
    const sel=window.getSelection(); if(!sel||!sel.rangeCount)return;
    const range=sel.getRangeAt(0); let isBefore=false;
    if(range.startContainer===editor){const imgIdx=Array.from(editor.childNodes).indexOf(img);isBefore=range.startOffset<=imgIdx;}
    else{const pos=img.compareDocumentPosition(range.startContainer);isBefore=!!(pos&Node.DOCUMENT_POSITION_PRECEDING);}
    if(isBefore){
      let node=img.nextSibling; while(node&&node.nodeType!==Node.TEXT_NODE)node=node.nextSibling;
      if(!node){node=document.createTextNode('\u200B');editor.appendChild(node);}
      const newRange=document.createRange(); newRange.setStart(node,node.length); newRange.collapse(true); sel.removeAllRanges(); sel.addRange(newRange);
    }
  });
});

const suppressedEmbeds=new Set();

function updatePreview(){
  const text=editor.innerText.replace(/\u200B/g,'').trim();
  const hasImg=!!editor.querySelector('img');
  const editorText=editor.innerText.replace(/\u200B/g,'');
  const allEmbeds=detectEmbeds(editorText+'\n'+links.join('\n'));
  const visibleEmbeds=allEmbeds.filter(e=>!suppressedEmbeds.has(e.url));
  document.getElementById('removeEmbedBtn').style.display=visibleEmbeds.length?'inline-block':'none';
  if(text||hasImg){previewMsg.innerHTML=buildPreviewHTML(editor.innerHTML)+buildEmbedPreviewHTML(visibleEmbeds);}
  else{previewMsg.innerHTML='<span style="color:#bbb;">your message will appear here...</span>';}
}

function buildPreviewHTML(html){
  const tmp=document.createElement('div'); tmp.innerHTML=html.replace(/\u200B/g,'');
  tmp.querySelectorAll('.link-span').forEach(span=>{const a=document.createElement('a');a.href=span.textContent;a.target='_blank';a.rel='noopener noreferrer';a.style.color='#0055cc';a.textContent=span.textContent;span.parentNode.replaceChild(a,span);});
  tmp.querySelectorAll('img').forEach(img=>{img.removeAttribute('style');img.style.cssText='float:left;max-width:200px;max-height:200px;margin:0 12px 8px 0;border:1px solid #aaa;display:block;';});
  tmp.querySelectorAll('.pic-specs').forEach(el=>{el.removeAttribute('contenteditable');el.style.cssText='font-family:monospace;font-size:11px;color:#cc0000;margin:0 0 2px;display:block;clear:both;';});
  return tmp.innerHTML;
}

function buildEmailHTML(html){
  const tmp=document.createElement('div'); tmp.innerHTML=html.replace(/\u200B/g,'');
  tmp.querySelectorAll('.link-span').forEach(span=>{const a=document.createElement('a');a.href=span.textContent;a.style.color='#0055cc';a.textContent=span.textContent;span.parentNode.replaceChild(a,span);});
  const img=tmp.querySelector('img'); const specs=tmp.querySelector('.pic-specs');
  const rawText=tmp.innerText||''; const embeds=detectEmbeds(rawText+'\n'+links.join('\n')); const embedsSection=buildEmbedEmailHTML(embeds);
  let bodyHTML;
  if(img){
    const specsHTML=specs?`<div style="font-family:monospace;font-size:11px;color:#cc0000;margin:0 0 4px;display:block;">${escapeHtml(specs.textContent)}</div>`:'';
    if(specs)specs.remove(); img.remove(); const textHTML=tmp.innerHTML.trim();
    bodyHTML=`${specsHTML}<table role="presentation" style="border-collapse:collapse;margin:0;"><tr><td style="vertical-align:top;padding-right:10px;"><img src="${escapeAttr(img.src)}" style="max-width:200px;max-height:200px;border:1px solid #ccc;display:block;"></td><td style="vertical-align:top;font-size:13px;line-height:1.6;">${textHTML||'&nbsp;'}</td></tr></table>`;
  }else{bodyHTML=tmp.innerHTML;}
  return bodyHTML+embedsSection;
}

function escapeHtml(str){return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function escapeAttr(str){return str.replace(/"/g,'&quot;');}

function truncateFileName(name,maxLen){
  if(name.length<=maxLen)return name; const ext=name.includes('.')?name.slice(name.lastIndexOf('.')):'';
  const base=name.slice(0,name.lastIndexOf('.')); const allowed=maxLen-ext.length-3;
  if(allowed<=0)return name.slice(0,maxLen-3)+'...'; return base.slice(0,allowed)+'...'+ext;
}

async function uploadToCloudinary(file){
  const fd=new FormData(); fd.append('file',file); fd.append('upload_preset',UPLOAD_PRESET);
  const res=await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`,{method:'POST',body:fd});
  const data=await res.json(); if(!data.secure_url)throw new Error('upload failed'); return data.secure_url;
}

async function insertImage(event){
  const file=event.target.files[0]; if(!file)return;
  const status=document.getElementById('statusMsg'); const fileDisplay=document.getElementById('fileNameDisplay');
  const removeBtn=document.getElementById('removeBtn'); const fileName=file.name; const fileSizeKB=(file.size/1024).toFixed(1);
  if(file.size>400*1024){status.textContent='Image too large (max 400 KB).';status.className='err';event.target.value='';return;}
  status.textContent='Uploading...'; status.className='';
  const tmpURL=URL.createObjectURL(file); const tmpImg=new Image(); tmpImg.src=tmpURL;
  await new Promise(res=>{tmpImg.onload=res;tmpImg.onerror=res;});
  const w=tmpImg.naturalWidth; const h=tmpImg.naturalHeight; URL.revokeObjectURL(tmpURL);
  const existingText=editor.innerText.replace(/\u200B/g,'').trim();
  try{
    const imgUrl=await uploadToCloudinary(file);
    const specs=document.createElement('div'); specs.className='pic-specs'; specs.contentEditable='false';
    specs.style.cssText='font-family:monospace;font-size:11px;color:#cc0000;margin:0 0 2px;display:block;cursor:default;clear:both;';
    specs.textContent=`File: ${fileName} (${fileSizeKB} KB, ${w}×${h})`;
    const img=document.createElement('img'); img.src=imgUrl; img.style.cssText='float:left;max-width:200px;max-height:200px;margin:0 12px 8px 0;border:1px solid #aaa;display:block;';
    const textNode=document.createTextNode(existingText||'\u200B');
    editor.innerHTML=''; editor.appendChild(specs); editor.appendChild(img); editor.appendChild(textNode);
    editor.focus(); const range=document.createRange(); range.setStart(textNode,textNode.length); range.collapse(true);
    const sel=window.getSelection(); sel.removeAllRanges(); sel.addRange(range);
    fileDisplay.textContent=truncateFileName(fileName,22); removeBtn.style.display='inline-block';
    status.textContent='Image uploaded!'; status.className='ok';
  }catch(err){status.textContent='Upload failed.';status.className='err';console.error(err);}
  event.target.value=''; highlightLinks(); updatePreview();
}

function removeAttachment(){
  editor.querySelectorAll('img').forEach(el=>el.remove()); editor.querySelectorAll('.pic-specs').forEach(el=>el.remove());
  document.getElementById('fileNameDisplay').textContent='No file chosen'; document.getElementById('removeBtn').style.display='none';
  document.getElementById('statusMsg').textContent=''; document.getElementById('statusMsg').className='';
  editor.innerHTML=editor.innerHTML.replace(/\u200B/g,''); highlightLinks(); updatePreview(); editor.focus();
}

function removeEmbeds(){
  const text=editor.innerText.replace(/\u200B/g,'').trim(); const embeds=detectEmbeds(text);
  embeds.forEach(e=>{if(!suppressedEmbeds.has(e.url))suppressedEmbeds.add(e.url);});
  document.getElementById('removeEmbedBtn').style.display='none'; updatePreview(); editor.focus();
}

async function sendMsg(){
  const rawText=editor.innerText.replace(/\u200B/g,'').trim(); const embeds=detectEmbeds(rawText);
  const embedsHTML=embeds.map(e=>{
    if(e.name==='youtube')return`<div style="margin:8px 0;"><a href="${e.url}" target="_blank"><img src="https://img.youtube.com/vi/${e.id}/hqdefault.jpg" style="max-width:300px;display:block;border:1px solid #ccc;"></a><div style="font-size:11px;color:#666;">YouTube</div></div>`;
    if(e.name==='spotify')return`<div style="margin:8px 0;"><a href="${e.url}" target="_blank" style="color:#1DB954;">▶ Open on Spotify</a></div>`;
    if(e.name==='soundcloud')return`<div style="margin:8px 0;"><a href="${e.url}" target="_blank" style="color:#ff5500;">▶ Open on SoundCloud</a></div>`;
    return'';
  }).join('');
  const hasImg=!!editor.querySelector('img'); const status=document.getElementById('statusMsg'); const btn=document.getElementById('sendBtn');
  if(!rawText&&!hasImg){status.textContent='Write something first.';status.className='err';return;}
  if(btn.disabled)return; btn.disabled=true; status.className=''; status.textContent='Sending...';
  const timeStr=getChanTime(); const finalHTML=buildEmailHTML(editor.innerHTML);
  try{
    await emailjs.send(SERVICE_ID,TEMPLATE_ID,{name:'Anonymous',from_email:'anonymous@noreply.com',subject:'anonymous message — watanagashi archive',message:rawText,message_html:finalHTML,time:timeStr});
    status.textContent='Post sent!'; status.className='ok';
    editor.innerHTML=''; previewMsg.innerHTML='<span style="color:#bbb;">your message will appear here...</span>';
    document.getElementById('fileNameDisplay').textContent='No file chosen'; document.getElementById('removeBtn').style.display='none'; document.getElementById('removeEmbedBtn').style.display='none';
    suppressedEmbeds.clear();
  }catch(err){status.textContent='Failed — trenchgun1337@gmail.com';status.className='err';console.error(err);}
  btn.disabled=false;
}
