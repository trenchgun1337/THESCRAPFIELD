<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Not Found</title>
    <style>
        /* Inversão instantânea sem transições */
        .inverted {
            filter: invert(1);
            background-color: #000; /* Força o fundo a ficar preto na inversão */
        }

        body {
            background-color: #ffffff;
            color: #000000;
            font-family: 'Tahoma', Tahoma, monospace;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            user-select: none;
        }

        .container {
            max-width: 400px;
        }

        .emoticon {
            font-size: 5rem;
            font-weight: bold;
            margin-bottom: 1rem;
            display: block;
        }

        .error-text {
            font-size: 1.2rem;
            letter-spacing: 1px;
            margin-bottom: 2rem;
            display: block;
        }

        /* Link como texto simples sublinhado */
        .link-back {
            color: #000000;
            text-decoration: underline;
            font-size: 0.9rem;
            text-transform: uppercase;
            font-weight: bold;
            cursor: pointer;
            background: none;
            border: none;
            padding: 0;
        }

        /* Impede cliques múltiplos */
        .disabled {
            pointer-events: none;
            cursor: default;
        }
    </style>
</head>
<body>

    <div class="container">
        <span id="face" class="emoticon">:-(</span>
        <span class="error-text">404 | Page Not Found</span>
        <br>
        <a href="https://trenchgun.neocities.org/" class="link-back" id="backBtn">get back</a>
    </div>

    <script>
        const backBtn = document.getElementById('backBtn');
        const face = document.getElementById('face');
        const audio = new Audio('https://raw.githubusercontent.com/trenchgun1337/THESCRAPFIELD/main/notfound.mp3');

        backBtn.addEventListener('click', function(e) {
            // Impede o redirecionamento imediato
            e.preventDefault();
            
            // Bloqueia novos cliques
            this.classList.add('disabled');

            // Inverte cores e troca o rosto instantaneamente
            document.documentElement.classList.add('inverted');
            face.innerText = ':-)';

            // Toca o áudio
            audio.play();

            // SÓ redireciona quando o áudio terminar
            audio.onended = function() {
                window.location.href = backBtn.href;
            };
        });
    </script>

</body>
</html>
