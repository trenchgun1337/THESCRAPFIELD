<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact — Watanagashi Archive</title>
<link rel="icon" type="image/x-icon" href="/assets/images/satokoico.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Sawarabi+Gothic&display=swap">
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
*:focus { outline:none !important; }
::selection { background:rgba(80,80,80,.45); color:#fff; }

:root {
  --accent: #cc1a1a;
  --text: #111;
  --border: rgba(0,0,0,.22);
}

html { scrollbar-width:thin; scrollbar-color:rgba(120,120,120,.5) transparent; }
::-webkit-scrollbar { width:6px; }
::-webkit-scrollbar-thumb { background:rgba(120,120,120,.5); border-radius:3px; }

body {
  font-family:'Sawarabi Gothic','Sazanami Gothic',Tahoma,'Segoe UI',sans-serif;
  font-size:12px;
  background-color:#000;
  background-image: url('../assets/images/whitebg.jpeg');
  background-size: cover;
  background-attachment: fixed;
  background-position: center center;
  color:var(--text);
  min-height:100vh;
  padding:18px 6px 40px;
  display:flex; flex-direction:column; align-items:center;
}

img { -webkit-user-drag:none; user-select:none; }
a { color:#000; text-decoration:none; }

#pageWrap { width:800px; max-width:100%; display:flex; flex-direction:column; gap:7px; }

/* corner logo */
#cornerLogo { position:fixed; top:10px; right:14px; z-index:9998; line-height:0; }
#cornerLogo img { height:36px; width:auto; opacity:.82; display:block; }
#cornerLogo:hover img { opacity:1; }

/* topbar */
.aero-bar {
  background: #d8d8d8;
  border: 2px ridge #727272;
  box-shadow: 0 2px 5px rgba(0,0,0,.15);
  padding: 4px 10px;
  display: flex; align-items: center; gap: 8px;
}
.back-link {
  color: var(--accent); font-size:11px; letter-spacing:1px;
  text-transform:uppercase; background:none; border:none; padding:0; cursor:pointer;
}
.back-link:hover { text-decoration:underline; }
.bar-title { flex:1; text-align:center; font-size:11px; letter-spacing:2px; text-transform:uppercase; }

/* compose window */
#composeWin {
  background: #f2f2f2;
  border: 2px ridge #727272;
  box-shadow: #595959 1px 1px 12px 1px;
  display: flex;
  flex-direction: column;
}

/* title bar */
#composeTitle {
  background: #3a3a3a;
  color: #ddd;
  font-size: 11px;
  letter-spacing: 1px;
  padding: 5px 10px;
  user-select: none;
}

/* anon row */
.anon-row {
  padding: 5px 10px;
  background: #ebebeb;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  color: #555;
}
.anon-row input[type=checkbox] { accent-color: var(--accent); cursor:pointer; }
.anon-row label { cursor:pointer; }

/* header fields */
.compose-fields { background: #f8f8f8; border-bottom: 1px solid var(--border); }
.compose-field-row {
  display: flex; align-items: center;
  border-bottom: 1px solid rgba(0,0,0,.07);
  padding: 0 10px;
}
.compose-field-row:last-child { border-bottom: none; }
.field-key { font-size:11px; color:#777; width:58px; flex-shrink:0; }
.field-val {
  flex:1; font-size:12px; padding:6px 0;
  background:none; border:none; color:var(--text); font-family:inherit;
}
.field-val::placeholder { color:#bbb; }

/* toolbar */
.compose-toolbar {
  background: #e4e4e4;
  border-bottom: 1px solid var(--border);
  padding: 4px 8px;
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 2px;
}
.tb-btn {
  background: #d8d8d8;
  border: 1px solid rgba(0,0,0,.20);
  padding: 2px 7px;
  font-family: inherit;
  font-size: 11px;
  cursor: pointer;
  color: #222;
  min-width: 24px;
  text-align: center;
  line-height: 1.5;
}
.tb-btn:hover { background: #c8c8c8; }
.tb-sep { width:1px; background:rgba(0,0,0,.15); margin:0 3px; height:16px; align-self:center; }

.tb-select {
  font-family:inherit; font-size:11px; background:#d8d8d8;
  border:1px solid rgba(0,0,0,.20); padding:2px 4px; cursor:pointer; color:#222;
}

.tb-label { font-size:10px; color:#666; }

.tb-color { width:22px; height:22px; border:1px solid rgba(0,0,0,.22); padding:1px; cursor:pointer; background:#d8d8d8; }

/* body editor */
#msgEditor {
  background: #fff;
  border: none;
  min-height: 200px;
  padding: 12px 14px;
  font-family: inherit;
  font-size: 12.5px;
  color: var(--text);
  line-height: 1.7;
  overflow-y: auto;
}
#msgEditor:empty::before {
  content: attr(data-placeholder);
  color: #bbb;
  pointer-events: none;
}

/* bottom */
.compose-bottom {
  background: #e4e4e4;
  border-top: 1px solid var(--border);
  padding: 7px 10px;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}
.send-btn {
  background: #c8c8c8;
  border: 1px solid rgba(0,0,0,.30);
  padding: 5px 22px;
  font-family: inherit;
  font-size: 11px;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--text);
  cursor: pointer;
}
.send-btn:hover { background: #b8b8b8; }
.send-btn:disabled { opacity:.5; cursor:default; }

#statusMsg { font-size:11px; color:#666; flex:1; }
#statusMsg.ok  { color:#2a7a2a; }
#statusMsg.err { color:var(--accent); }

.note-bar {
  font-size:10.5px; color:#888; text-align:center;
  padding: 5px 10px;
  border-top: 1px solid rgba(0,0,0,.08);
  background: #f8f8f8;
  line-height: 1.6;
}

/* sound toggle */
#soundToggle {
  position:fixed; bottom:8px; left:10px; z-index:9999;
  font-family:inherit; font-size:10px; color:rgba(0,0,0,.40);
  cursor:pointer; user-select:none; background:none; border:none;
}
#soundToggle:hover { color:rgba(0,0,0,.70); }
#soundToggle.off   { color:rgba(0,0,0,.22); }

@media (max-width:800px) { #pageWrap { width:100%; } }
@media (max-width:600px) { body { padding:8px 4px 24px; background-attachment:scroll; } }
</style>
</head>
<body>

<a id="cornerLogo" href="../index.html" title="Watanagashi Archive — Home">
  <img src="../assets/images/watanagashilogo.png" alt="Watanagashi Archive" onerror="this.style.display='none'">
</a>

<div id="pageWrap">

  <div class="aero-bar">
    <a class="back-link" href="../index.html">back</a>
    <span class="bar-title">contact me</span>
  </div>

  <div id="composeWin">

    <div id="composeTitle">New Message — Watanagashi Archive</div>

    <div class="anon-row">
      <input type="checkbox" id="anonCheck" onchange="toggleAnon()">
      <label for="anonCheck">send anonymously</label>
    </div>

    <div class="compose-fields">
      <div class="compose-field-row">
        <span class="field-key">To</span>
        <span class="field-val" style="color:#555;">trenchgun1337@gmail.com</span>
      </div>
      <div class="compose-field-row" id="fromRow">
        <span class="field-key">From</span>
        <input class="field-val" type="email" id="senderEmail" placeholder="your email (optional — for reply)">
      </div>
      <div class="compose-field-row" id="nameRow">
        <span class="field-key">Name</span>
        <input class="field-val" type="text" id="senderName" placeholder="your name (optional)">
      </div>
      <div class="compose-field-row">
        <span class="field-key">Subject</span>
        <input class="field-val" type="text" id="msgSubject" placeholder="(no subject)">
      </div>
    </div>

    <!-- toolbar — only what actually works through EmailJS HTML -->
    <div class="compose-toolbar">
      <select class="tb-select" onchange="fmt('fontSize',this.value)" title="Size">
        <option value="1">8pt</option>
        <option value="2">10pt</option>
        <option value="3" selected>12pt</option>
        <option value="4">14pt</option>
        <option value="5">18pt</option>
        <option value="6">24pt</option>
      </select>
      <div class="tb-sep"></div>
      <button class="tb-btn" title="Bold"          onmousedown="event.preventDefault();fmt('bold')"><b>B</b></button>
      <button class="tb-btn" title="Italic"        onmousedown="event.preventDefault();fmt('italic')"><i>I</i></button>
      <button class="tb-btn" title="Underline"     onmousedown="event.preventDefault();fmt('underline')"><u>U</u></button>
      <button class="tb-btn" title="Strikethrough" onmousedown="event.preventDefault();fmt('strikeThrough')"><s>S</s></button>
      <div class="tb-sep"></div>
      <button class="tb-btn" title="Align left"   onmousedown="event.preventDefault();fmt('justifyLeft')">&#8676;</button>
      <button class="tb-btn" title="Center"        onmousedown="event.preventDefault();fmt('justifyCenter')">&#8660;</button>
      <button class="tb-btn" title="Align right"  onmousedown="event.preventDefault();fmt('justifyRight')">&#8677;</button>
      <div class="tb-sep"></div>
      <button class="tb-btn" title="Bullet list"   onmousedown="event.preventDefault();fmt('insertUnorderedList')">• list</button>
      <button class="tb-btn" title="Numbered list" onmousedown="event.preventDefault();fmt('insertOrderedList')">1. list</button>
      <div class="tb-sep"></div>
      <button class="tb-btn" title="Link"          onmousedown="event.preventDefault();insertLink()">link</button>
      <div class="tb-sep"></div>
      <span class="tb-label">A</span>
      <input type="color" class="tb-color" id="txtColor" value="#111111" onchange="fmt('foreColor',this.value)" title="Text color">
      <span class="tb-label" style="margin-left:4px;">bg</span>
      <input type="color" class="tb-color" id="bgColor" value="#ffffff" onchange="fmt('hiliteColor',this.value)" title="Highlight">
      <div class="tb-sep"></div>
      <button class="tb-btn" title="Clear formatting" onmousedown="event.preventDefault();fmt('removeFormat')">clear</button>
    </div>

    <div id="msgEditor"
      contenteditable="true"
      data-placeholder="write your message here..."
      spellcheck="true">
    </div>

    <div class="compose-bottom">
      <button class="send-btn" id="sendBtn" onclick="sendMsg()">Send</button>
      <div id="statusMsg"></div>
    </div>

    <div class="note-bar">
      name and email are optional — anonymous messages welcome &nbsp;·&nbsp;
      formatting (bold, italic, color, lists, links) is preserved in the received email
    </div>

  </div>

</div>

<button id="soundToggle" onclick="toggleSound()">Sounds: On</button>

<script>
emailjs.init({ publicKey: 'iww-r-sgJVyoRmokf' });
const SERVICE_ID  = 'service_ina2cb8';
const TEMPLATE_ID = 'template_g7owumb';

function toggleAnon() {
  const hide = document.getElementById('anonCheck').checked;
  document.getElementById('fromRow').style.display = hide ? 'none' : '';
  document.getElementById('nameRow').style.display = hide ? 'none' : '';
}

function fmt(cmd, val) {
  document.getElementById('msgEditor').focus();
  document.execCommand(cmd, false, val || null);
}

function insertLink() {
  const url = prompt('URL:');
  if (url) { document.getElementById('msgEditor').focus(); document.execCommand('createLink', false, url); }
}

async function sendMsg() {
  const anon    = document.getElementById('anonCheck').checked;
  const name    = anon ? 'Anonymous' : (document.getElementById('senderName').value.trim() || 'Anonymous');
  const email   = anon ? 'anonymous@noreply.com' : (document.getElementById('senderEmail').value.trim() || 'anonymous@noreply.com');
  const subject = document.getElementById('msgSubject').value.trim() || '(no subject)';
  const editor  = document.getElementById('msgEditor');
  const msgHTML = editor.innerHTML.trim();
  const msgText = editor.innerText.trim();

  const status = document.getElementById('statusMsg');
  const btn    = document.getElementById('sendBtn');

  if (!msgText) { status.textContent = 'write something first.'; status.className = 'err'; return; }

  btn.disabled = true;
  status.className = '';
  status.textContent = 'sending...';

  try {
    await emailjs.send(SERVICE_ID, TEMPLATE_ID, {
      from_name:    name,
      from_email:   email,
      subject:      subject,
      message:      msgText,
      message_html: msgHTML,
    });
    status.textContent = 'sent!';
    status.className = 'ok';
    editor.innerHTML = '';
    document.getElementById('msgSubject').value = '';
    if (!anon) {
      document.getElementById('senderName').value  = '';
      document.getElementById('senderEmail').value = '';
    }
  } catch(e) {
    status.textContent = 'failed — trenchgun1337@gmail.com';
    status.className = 'err';
    console.error(e);
  }
  btn.disabled = false;
}

/* sounds */
const SOUND_BASE = '../assets/audio/';
const SOUNDS = { start:'sitestart.mp3', button:'sitebuttonclick.mp3' };
let _soundsOn = true;
const _ac = {};
function _ga(k){if(!_ac[k]){const a=new Audio(SOUND_BASE+SOUNDS[k]);a.preload='auto';_ac[k]=a;}return _ac[k];}
function playSound(k){if(!_soundsOn||!SOUNDS[k])return;try{const c=_ga(k).cloneNode();c.volume=.52;c.play().catch(()=>{});}catch(e){}}
function toggleSound(){_soundsOn=!_soundsOn;const b=document.getElementById('soundToggle');if(b){b.textContent=_soundsOn?'Sounds: On':'Sounds: Off';b.classList.toggle('off',!_soundsOn);}if(_soundsOn)playSound('button');sessionStorage.setItem('_soundsOn',String(_soundsOn));}
document.addEventListener('DOMContentLoaded',()=>{
  const s=sessionStorage.getItem('_soundsOn');
  if(s==='false'){_soundsOn=false;const b=document.getElementById('soundToggle');if(b){b.textContent='Sounds: Off';b.classList.add('off');}}
  if(!sessionStorage.getItem('_siteStartPlayed')){sessionStorage.setItem('_siteStartPlayed','1');setTimeout(()=>playSound('start'),700);}
});
document.addEventListener('click',e=>{if(e.target.id==='soundToggle')return;const t=e.target.tagName;if(t==='BUTTON'||t==='A')playSound('button');},true);
</script>
</body>
</html>
