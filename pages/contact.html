<script>
// ============================================================
// CONFIGURAÇÃO – SUBSTITUA PELO SEU E-MAIL REAL
// ============================================================
const SEU_EMAIL = 'trenchgun1337@gmail.com';  // <--- SEU E-MAIL

// ============================================================

// ============================================================
const CLOUD_NAME    = 'dagsxkazw';
const UPLOAD_PRESET = 'unsigned_upload';

// ============================================================
// FUNÇÕES AUXILIARES
// ============================================================
function getChanTime() {
  const now  = new Date();
  const mm   = String(now.getMonth() + 1).padStart(2, '0');
  const dd   = String(now.getDate()).padStart(2, '0');
  const yy   = String(now.getFullYear()).slice(2);
  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const day  = days[now.getDay()];
  const hh   = String(now.getHours()).padStart(2, '0');
  const min  = String(now.getMinutes()).padStart(2, '0');
  const ss   = String(now.getSeconds()).padStart(2, '0');
  return `${mm}/${dd}/${yy}(${day})${hh}:${min}:${ss}`;
}

function getPostNumber() {
  return Math.floor(Math.random() * 900000) + 100000;
}

const embedPatterns = [
  {
    name: 'youtube',
    regex: /https?:\/\/(?:www\.)?(?:youtube\.com\/watch\?(?:[^#&\s]*&)*v=|youtu\.be\/)([a-zA-Z0-9_-]{11})/g,
    build: (m) => ({ url: m[0], id: m[1], iframeSrc: `https://www.youtube.com/embed/${m[1]}`, width: '100%', height: '95' })
  },
  {
    name: 'spotify',
    regex: /https?:\/\/open\.spotify\.com\/(?:intl-[a-z]{2}\/)?(track|album|playlist|episode)\/([a-zA-Z0-9]+)(?:\?[^\s]*)?/g,
    build: (m) => ({ url: m[0], iframeSrc: `https://open.spotify.com/embed/${m[1]}/${m[2]}?utm_source=generator&theme=0`, width: '100%', height: '95' })
  },
  {
    name: 'soundcloud',
    regex: /https?:\/\/(?:www\.)?soundcloud\.com\/[a-zA-Z0-9_-]+\/[a-zA-Z0-9_-]+(?:\?[^\s]*)?/g,
    build: (m) => ({ url: m[0], iframeSrc: `https://w.soundcloud.com/player/?url=${encodeURIComponent(m[0])}&color=%23ff5500&auto_play=false&hide_related=true&show_comments=false&show_user=true&show_reposts=false&show_teaser=false`, width: '100%', height: '95' })
  }
];

const EMBED_URL_REGEX = /https?:\/\/(?:(?:www\.)?(?:youtube\.com\/watch\?[^\s]*v=[a-zA-Z0-9_-]{11}|youtu\.be\/[a-zA-Z0-9_-]{11})|open\.spotify\.com\/(?:intl-[a-z]{2}\/)?(?:track|album|playlist|episode)\/[a-zA-Z0-9]+(?:\?[^\s]*)?|(?:www\.)?soundcloud\.com\/[a-zA-Z0-9_-]+\/[a-zA-Z0-9_-]+(?:\?[^\s]*)?)/g;

function detectEmbeds(text) {
  const found = [];
  for (const pat of embedPatterns) {
    pat.regex.lastIndex = 0;
    let m;
    while ((m = pat.regex.exec(text)) !== null) {
      const built = pat.build(m);
      if (!found.some(e => e.url === built.url)) {
        found.push({ ...built, name: pat.name });
      }
    }
  }
  return found;
}

function buildEmbedPreviewHTML(embeds) {
  if (!embeds.length) return '';
  return embeds.map(e => `<div class="embed-wrap"><iframe src="${escapeAttr(e.iframeSrc)}" width="${e.width}" height="${e.height}" frameborder="0" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" allowfullscreen loading="lazy" style="border-radius:0;border:1px solid #ccc;display:block;"></iframe></div>`).join('');
}

function buildEmbedEmailHTML(embeds) {
  if (!embeds.length) return '';
  return embeds.map(e => {
    if (e.name === 'youtube') return `<div style="margin:8px 0;"><a href="${escapeAttr(e.url)}" target="_blank"><img src="https://img.youtube.com/vi/${e.id}/hqdefault.jpg" style="max-width:300px;display:block;border:1px solid #ccc;"></a><div style="font-size:11px;color:#666;">YouTube</div></div>`;
    if (e.name === 'spotify') return `<div style="margin:8px 0;"><a href="${escapeAttr(e.url)}" target="_blank" style="color:#1DB954;">▶ Open on Spotify</a></div>`;
    if (e.name === 'soundcloud') return `<div style="margin:8px 0;"><a href="${escapeAttr(e.url)}" target="_blank" style="color:#ff5500;">▶ Open on SoundCloud</a></div>`;
    return '';
  }).join('');
}

// ========== EDITOR HIGHLIGHT LINKS ==========
function getCaretCharOffset(el) {
  const sel = window.getSelection();
  if (!sel || !sel.rangeCount) return 0;
  const range = sel.getRangeAt(0).cloneRange();
  const preRange = document.createRange();
  preRange.selectNodeContents(el);
  preRange.setEnd(range.endContainer, range.endOffset);
  return preRange.toString().length;
}

function setCaretByOffset(el, offset) {
  const sel = window.getSelection();
  if (!sel) return;
  let pos = 0, found = false;
  function walk(node) {
    if (found) return;
    if (node.nodeType === Node.TEXT_NODE) {
      const len = node.textContent.length;
      if (pos + len >= offset) {
        const range = document.createRange();
        range.setStart(node, offset - pos);
        range.collapse(true);
        sel.removeAllRanges();
        sel.addRange(range);
        found = true;
        return;
      }
      pos += len;
    } else {
      for (const child of node.childNodes) walk(child);
    }
  }
  walk(el);
  if (!found) {
    const range = document.createRange();
    range.selectNodeContents(el);
    range.collapse(false);
    sel.removeAllRanges();
    sel.addRange(range);
  }
}

function unwrapLinkSpans() {
  editor.querySelectorAll('.link-span').forEach(span => {
    const parent = span.parentNode;
    if (!parent) return;
    while (span.firstChild) parent.insertBefore(span.firstChild, span);
    parent.removeChild(span);
  });
  editor.normalize();
}

function highlightLinks() {
  const rawText = editor.textContent.replace(/\u200B/g, '');
  EMBED_URL_REGEX.lastIndex = 0;
  const hasLinks = EMBED_URL_REGEX.test(rawText);
  const hasSpans = !!editor.querySelector('.link-span');
  if (!hasLinks && !hasSpans) return;

  const caretOffset = getCaretCharOffset(editor);
  unwrapLinkSpans();

  function processNode(node) {
    if (node.nodeType === Node.ELEMENT_NODE) {
      if (node.tagName === 'IMG' || (node.classList && (node.classList.contains('pic-specs') || node.classList.contains('link-span')))) return;
      Array.from(node.childNodes).forEach(processNode);
    } else if (node.nodeType === Node.TEXT_NODE) {
      EMBED_URL_REGEX.lastIndex = 0;
      if (!EMBED_URL_REGEX.test(node.textContent)) return;
      EMBED_URL_REGEX.lastIndex = 0;
      const frag = document.createDocumentFragment();
      let lastIndex = 0, m;
      const text = node.textContent;
      while ((m = EMBED_URL_REGEX.exec(text)) !== null) {
        if (m.index > lastIndex) frag.appendChild(document.createTextNode(text.slice(lastIndex, m.index)));
        const span = document.createElement('span');
        span.className = 'link-span';
        span.style.color = '#0055cc';
        span.textContent = m[0];
        frag.appendChild(span);
        lastIndex = m.index + m[0].length;
      }
      if (lastIndex < text.length) frag.appendChild(document.createTextNode(text.slice(lastIndex)));
      if (node.parentNode) node.parentNode.replaceChild(frag, node);
    }
  }
  Array.from(editor.childNodes).forEach(processNode);
  setCaretByOffset(editor, caretOffset);
}

// ========== LINKS MANUAIS ==========
const links = [];
const linkInput = document.getElementById('linkInput');
const linkDropdown = document.getElementById('linkDropdown');

function renderLinks() {
  linkDropdown.innerHTML = links.map((l, i) => `
    <div style="display:flex;justify-content:space-between;gap:6px;margin-bottom:3px;">
      <span style="color:#0055cc;overflow:hidden;text-overflow:ellipsis;">${escapeHtml(l)}</span>
      <button onclick="removeLink(${i})" style="color:red;background:none;border:none;cursor:pointer;">x</button>
    </div>
  `).join('');
}

function removeLink(i) {
  links.splice(i, 1);
  renderLinks();
  updatePreview();
}

linkInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    e.preventDefault();
    const val = linkInput.value.trim();
    if (!val) return;
    if (!links.includes(val)) links.push(val);
    linkInput.value = '';
    renderLinks();
    updatePreview();
  }
});

// ========== EXTRAIR LINKS DO EDITOR ==========
function extractLinksFromEditor() {
  const text = editor.innerText.replace(/\u200B/g, '');
  EMBED_URL_REGEX.lastIndex = 0;
  const matches = text.match(EMBED_URL_REGEX);
  if (!matches) return;
  matches.forEach(link => {
    if (!links.includes(link)) links.push(link);
  });
  renderLinks();
}

// ========== EDITOR E PREVIEW ==========
const editor = document.getElementById('msgEditor');
const previewMsg = document.getElementById('previewMsg');
const previewTime = document.getElementById('previewTime');

previewTime.textContent = getChanTime();
setInterval(() => { previewTime.textContent = getChanTime(); }, 1000);

const suppressedEmbeds = new Set();

function updatePreview() {
  const text = editor.innerText.replace(/\u200B/g, '').trim();
  const hasImg = !!editor.querySelector('img');
  const editorText = editor.innerText.replace(/\u200B/g, '');
  const allEmbeds = detectEmbeds(editorText + '\n' + links.join('\n'));
  const visibleEmbeds = allEmbeds.filter(e => !suppressedEmbeds.has(e.url));
  document.getElementById('removeEmbedBtn').style.display = visibleEmbeds.length ? 'inline-block' : 'none';
  if (text || hasImg) {
    const msgHTML = buildPreviewHTML(editor.innerHTML);
    const embedsHTML = buildEmbedPreviewHTML(visibleEmbeds);
    previewMsg.innerHTML = msgHTML + embedsHTML;
  } else {
    previewMsg.innerHTML = '<span style="color:#bbb;">your message will appear here...</span>';
  }
}

function buildPreviewHTML(html) {
  const tmp = document.createElement('div');
  tmp.innerHTML = html.replace(/\u200B/g, '');
  tmp.querySelectorAll('.link-span').forEach(span => {
    const a = document.createElement('a');
    a.href = span.textContent;
    a.target = '_blank';
    a.rel = 'noopener noreferrer';
    a.style.color = '#0055cc';
    a.textContent = span.textContent;
    span.parentNode.replaceChild(a, span);
  });
  tmp.querySelectorAll('img').forEach(img => {
    img.removeAttribute('style');
    img.style.cssText = 'float:left;max-width:200px;max-height:200px;margin:0 12px 8px 0;border:1px solid #aaa;display:block;';
  });
  tmp.querySelectorAll('.pic-specs').forEach(el => {
    el.removeAttribute('contenteditable');
    el.style.cssText = 'font-family:monospace;font-size:11px;color:#cc0000;margin:0 0 2px;display:block;clear:both;';
  });
  return tmp.innerHTML;
}

function buildEmailHTML(html) {
  const tmp = document.createElement('div');
  tmp.innerHTML = html.replace(/\u200B/g, '');
  tmp.querySelectorAll('.link-span').forEach(span => {
    const a = document.createElement('a');
    a.href = span.textContent;
    a.style.color = '#0055cc';
    a.textContent = span.textContent;
    span.parentNode.replaceChild(a, span);
  });
  const img = tmp.querySelector('img');
  const specs = tmp.querySelector('.pic-specs');
  let bodyHTML;
  if (img) {
    const specsHTML = specs ? `<div style="font-family:monospace;font-size:11px;color:#cc0000;margin:0 0 4px;display:block;">${escapeHtml(specs.textContent)}</div>` : '';
    if (specs) specs.remove();
    img.remove();
    const textHTML = tmp.innerHTML.trim();
    bodyHTML = `${specsHTML}<table role="presentation" style="border-collapse:collapse;margin:0;"><tr><td style="vertical-align:top;padding-right:10px;"><img src="${escapeAttr(img.src)}" style="max-width:200px;max-height:200px;border:1px solid #ccc;display:block;"></td><td style="vertical-align:top;font-size:13px;line-height:1.6;">${textHTML || '&nbsp;'}</td></tr></table>`;
  } else {
    bodyHTML = tmp.innerHTML;
  }
  return bodyHTML;
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function escapeAttr(str) {
  return str.replace(/"/g, '&quot;');
}

// ========== IMAGEM ==========
function truncateFileName(name, maxLen) {
  if (name.length <= maxLen) return name;
  const ext = name.includes('.') ? name.slice(name.lastIndexOf('.')) : '';
  const base = name.slice(0, name.lastIndexOf('.'));
  const allowed = maxLen - ext.length - 3;
  if (allowed <= 0) return name.slice(0, maxLen - 3) + '...';
  return base.slice(0, allowed) + '...' + ext;
}

async function uploadToCloudinary(file) {
  const fd = new FormData();
  fd.append('file', file);
  fd.append('upload_preset', UPLOAD_PRESET);
  const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, { method:'POST', body:fd });
  const data = await res.json();
  if (!data.secure_url) throw new Error('upload failed');
  return data.secure_url;
}

async function insertImage(event) {
  const file = event.target.files[0];
  if (!file) return;
  const status = document.getElementById('statusMsg');
  const fileDisplay = document.getElementById('fileNameDisplay');
  const removeBtn = document.getElementById('removeBtn');
  const fileName = file.name;
  const fileSizeKB = (file.size / 1024).toFixed(1);
  if (file.size > 400 * 1024) {
    status.textContent = 'Image too large (max 400 KB).';
    status.className = 'err';
    event.target.value = '';
    return;
  }
  status.textContent = 'Uploading...';
  status.className = '';
  const tmpURL = URL.createObjectURL(file);
  const tmpImg = new Image();
  tmpImg.src = tmpURL;
  await new Promise(res => { tmpImg.onload = res; tmpImg.onerror = res; });
  const w = tmpImg.naturalWidth, h = tmpImg.naturalHeight;
  URL.revokeObjectURL(tmpURL);
  const existingText = editor.innerText.replace(/\u200B/g, '').trim();
  try {
    const imgUrl = await uploadToCloudinary(file);
    const specs = document.createElement('div');
    specs.className = 'pic-specs';
    specs.contentEditable = 'false';
    specs.style.cssText = 'font-family:monospace;font-size:11px;color:#cc0000;margin:0 0 2px;display:block;cursor:default;clear:both;';
    specs.textContent = `File: ${fileName} (${fileSizeKB} KB, ${w}×${h})`;
    const img = document.createElement('img');
    img.src = imgUrl;
    img.style.cssText = 'float:left;max-width:200px;max-height:200px;margin:0 12px 8px 0;border:1px solid #aaa;display:block;';
    const textNode = document.createTextNode(existingText || '\u200B');
    editor.innerHTML = '';
    editor.appendChild(specs);
    editor.appendChild(img);
    editor.appendChild(textNode);
    editor.focus();
    const range = document.createRange();
    range.setStart(textNode, textNode.length);
    range.collapse(true);
    window.getSelection().removeAllRanges();
    window.getSelection().addRange(range);
    fileDisplay.textContent = truncateFileName(fileName, 22);
    removeBtn.style.display = 'inline-block';
    status.textContent = 'Image uploaded!';
    status.className = 'ok';
  } catch (err) {
    status.textContent = 'Upload failed.';
    status.className = 'err';
    console.error(err);
  }
  event.target.value = '';
  highlightLinks();
  updatePreview();
}

function removeAttachment() {
  editor.querySelectorAll('img').forEach(el => el.remove());
  editor.querySelectorAll('.pic-specs').forEach(el => el.remove());
  document.getElementById('fileNameDisplay').textContent = 'No file chosen';
  document.getElementById('removeBtn').style.display = 'none';
  document.getElementById('statusMsg').textContent = '';
  document.getElementById('statusMsg').className = '';
  editor.innerHTML = editor.innerHTML.replace(/\u200B/g, '');
  highlightLinks();
  updatePreview();
  editor.focus();
}

function removeEmbeds() {
  const text = editor.innerText.replace(/\u200B/g, '').trim();
  const embeds = detectEmbeds(text + '\n' + links.join('\n'));
  embeds.forEach(e => { if (!suppressedEmbeds.has(e.url)) suppressedEmbeds.add(e.url); });
  document.getElementById('removeEmbedBtn').style.display = 'none';
  updatePreview();
  editor.focus();
}

// ========== EVENTOS DO EDITOR ==========
editor.addEventListener('input', () => {
  suppressedEmbeds.clear();
  extractLinksFromEditor();
  highlightLinks();
  updatePreview();
});
editor.addEventListener('paste', (e) => {
  e.preventDefault();
  const text = e.clipboardData.getData('text/plain');
  if (text) document.execCommand('insertText', false, text);
});
editor.addEventListener('dragstart', (e) => { if (e.target.tagName === 'IMG') e.preventDefault(); });
editor.addEventListener('keydown', (e) => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'a') {
    const img = editor.querySelector('img');
    if (img) {
      e.preventDefault();
      const sel = window.getSelection();
      sel.removeAllRanges();
      const textNodes = [];
      function collect(n) {
        if (n.nodeType === Node.TEXT_NODE) textNodes.push(n);
        else if (n.tagName !== 'IMG' && !(n.classList && n.classList.contains('pic-specs'))) for (const c of n.childNodes) collect(c);
      }
      collect(editor);
      if (textNodes.length) {
        const range = document.createRange();
        range.setStart(textNodes[0], 0);
        range.setEnd(textNodes[textNodes.length-1], textNodes[textNodes.length-1].textContent.length);
        sel.addRange(range);
      }
      return;
    }
  }
  if (e.key === 'Enter') {
    e.preventDefault();
    const sel = window.getSelection();
    if (!sel.rangeCount) return;
    const range = sel.getRangeAt(0);
    range.deleteContents();
    const br = document.createElement('br');
    range.insertNode(br);
    range.setStartAfter(br);
    range.setEndAfter(br);
    sel.removeAllRanges();
    sel.addRange(range);
  }
});
editor.addEventListener('click', () => {
  const img = editor.querySelector('img');
  if (!img) return;
  requestAnimationFrame(() => {
    const sel = window.getSelection();
    if (!sel || !sel.rangeCount) return;
    const range = sel.getRangeAt(0);
    let isBefore = false;
    if (range.startContainer === editor) {
      const imgIdx = Array.from(editor.childNodes).indexOf(img);
      isBefore = range.startOffset <= imgIdx;
    } else {
      isBefore = !!(img.compareDocumentPosition(range.startContainer) & Node.DOCUMENT_POSITION_PRECEDING);
    }
    if (isBefore) {
      let node = img.nextSibling;
      while (node && node.nodeType !== Node.TEXT_NODE) node = node.nextSibling;
      if (!node) {
        node = document.createTextNode('\u200B');
        editor.appendChild(node);
      }
      const newRange = document.createRange();
      newRange.setStart(node, node.length);
      newRange.collapse(true);
      sel.removeAllRanges();
      sel.addRange(newRange);
    }
  });
});

// ========== ENVIO VIA FORMSUBMIT (SEM EMAILJS) ==========
async function sendMsg() {
  const rawText = editor.innerText.replace(/\u200B/g, '').trim();
  const hasImg = !!editor.querySelector('img');
  const status = document.getElementById('statusMsg');

    status.textContent = 'Write something first.';
    status.className = 'err';
    return;
  }
  if (btn.disabled) return;
  btn.disabled = true;
  status.className = '';
  status.textContent = 'Sending...';
  const timeStr = getChanTime();
  const postNumber = getPostNumber();
  const bodyHTML = buildEmailHTML(editor.innerHTML);
  const allEmbeds = detectEmbeds(rawText + '\n' + links.join('\n'));
  const embedsHTML = buildEmbedEmailHTML(allEmbeds);
  const emailHTML = `
<div style="font-family: system-ui, Arial, sans-serif; font-size: 13px; color:#111;">
  <div style="margin-bottom:10px;">An anonymous message has been received. Kindly respond at your earliest convenience.</div>
  <div style="margin-top: 5px; color: #888; font-size: 12px;">Source: watanagashiarchive.vercel.app/contact</div>
  <div style="margin-top: 20px; padding: 15px 0; border-top:1px dashed lightgrey; border-bottom:1px dashed lightgrey;">
    <table role="presentation" style="border-collapse: collapse; width:100%;">
      <tr>
        <td style="vertical-align: top;">
          <div style="color: #2c3e50; font-size: 15px;"><strong>Anonymous</strong></div>
          <div style="color:#aaa; font-size:12px;">${escapeHtml(timeStr)} • No.${postNumber}</div>
          <div style="font-size: 14px; margin-top: 6px; line-height: 1.6;">${bodyHTML}</div>
          <div style="margin-top:12px;">${embedsHTML}</div>
        </td>
      </tr>
    </table>
  </div>
</div>`;
  try {
   const response = await fetch('https://formsubmit.co/ajax/' + SEU_EMAIL, {
  method: 'POST',
  headers: { 'Content-Type': 'application/json' },
  body: JSON.stringify({
    _subject: `Contato do Archive - ${timeStr}`,
    _html: emailHTML,          // ← campo correto para HTML
    _captcha: 'false',
    _autoresponse: 'Thank you! ill try to respond as soon as i can :)',
    // remova _template: 'table' para não misturar
  })
});
    if (response.ok) {
      status.textContent = 'Post sent!';
      status.className = 'ok';
      editor.innerHTML = '';
      previewMsg.innerHTML = '<span style="color:#bbb;">your message will appear here...</span>';
      links.length = 0;
      renderLinks();
      document.getElementById('fileNameDisplay').textContent = 'No file chosen';
      document.getElementById('removeBtn').style.display = 'none';
      document.getElementById('removeEmbedBtn').style.display = 'none';
      suppressedEmbeds.clear();
    } else {
      const errorData = await response.json();
      throw new Error(errorData.msg || 'Erro no envio');
    }
  } catch (err) {
    status.textContent = 'Failed — ' + err.message;
    status.className = 'err';
    console.error(err);
  }
  btn.disabled = false;
}

document.getElementById('sendBtn').onclick = sendMsg;
