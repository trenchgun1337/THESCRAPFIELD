<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact — Watanagashi Archive</title>
<link rel="icon" type="image/x-icon" href="../assets/images/favicon.ico">
<link rel="stylesheet" href="https://unpkg.com/7.css">
<style>
/* ── Reset ── */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
* { -webkit-tap-highlight-color: transparent; }
::selection { background: rgba(204,26,26,.35) !important; color:#fff !important; }
::-moz-selection { background: rgba(204,26,26,.35) !important; color:#fff !important; }
*:focus { outline: none !important; }
button:active, button:focus, button:focus-visible { outline:none !important; box-shadow:none !important; }

:root {
  --accent:       #cc1a1a;
  --text:         #c8c8c8;
  --green:        #3cda56;
  --glass-border: rgba(150,150,150,.40);
  --aero-border:  rgba(140,140,140,.40);
  --bar-grad: linear-gradient(to bottom,
    rgba(255,255,255,.22) 0%, rgba(185,185,185,.88) 0%,
    rgba(120,120,120,.76) 4%, rgba(26,26,26,.98) 52%,
    rgba(4,4,4,1) 52%, rgba(14,14,14,.99) 100%);
  --bar-shine:    rgba(255,255,255,.24);
  --bar-border-t: rgba(255,255,255,.18);
  --bar-border-b: rgba(0,0,0,.88);
  --bar-border-s: rgba(140,140,140,.44);
  --bar-glow-top: linear-gradient(180deg,rgba(255,255,255,.14) 0%,rgba(200,200,200,.02) 100%);
  --bar-text:     #f2f2f2;
  --bar-tshadow:  0 1px 3px rgba(0,0,0,.98), 0 0 10px rgba(200,200,200,.20);
  --contact-hover: linear-gradient(to bottom,
    rgba(255,255,255,.12) 0%,
    rgba(170,170,170,.18) 20%,
    rgba(130,130,130,.16) 50%,
    rgba(22,22,22,.32)    50%,
    rgba(150,150,150,.46) 100%);
}

html {
  scrollbar-width: thin;
  scrollbar-color: rgba(140,140,140,.50) transparent;
}
::-webkit-scrollbar { width:6px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:rgba(140,140,140,.50); border-radius:3px; }
::-webkit-scrollbar-thumb:hover { background:rgba(200,200,200,.72); }

body {
  font-family: Tahoma, 'Segoe UI', Geneva, Verdana, sans-serif;
  font-size: 12px;
  background: #000 url('https://static.myfigurecollection.net/upload/pictures/2022/10/24/3309088.jpeg') center/contain fixed no-repeat;
  color: var(--text);
  min-height: 100vh;
  padding: 12px 6px 30px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

a { color: var(--text); text-decoration: none; }
a:hover { color: var(--green); text-decoration: underline; }
p { font-size: 12.5px; line-height: 18px; color: var(--text); margin:0; }
p + p { margin-top: 5px; }
strong { color: var(--accent); font-weight: 400; }

/* ── Page wrap ── */
#pageWrap {
  width: 800px;
  max-width: 100%;
  display: flex;
  flex-direction: column;
}

/* ── Corner logo (top-right, links to index introduction) ── */
#cornerLogo {
  position: fixed;
  top: 10px;
  right: 14px;
  z-index: 9998;
  line-height: 0;
  text-decoration: none;
}
#cornerLogo img {
  height: 36px;
  width: auto;
  object-fit: contain;
  display: block;
  filter: drop-shadow(0 1px 4px rgba(0,0,0,.90));
  opacity: .82;
  transition: opacity .18s, filter .18s;
  pointer-events: auto;
}
#cornerLogo:hover img {
  opacity: 1;
  filter: drop-shadow(0 0 8px rgba(255,255,255,.55)) drop-shadow(0 1px 4px rgba(0,0,0,.90));
}

/* ── Aero Bar ── */
.aero-bar {
  background: var(--bar-grad);
  border: 1px solid var(--bar-border-s);
  border-top-color: var(--bar-border-t);
  border-bottom-color: var(--bar-border-b);
  box-shadow: inset 0 1px 0 var(--bar-shine), inset 0 2px 4px rgba(255,255,255,.10), 0 3px 10px rgba(0,0,0,.48);
  color: var(--bar-text);
  font-size: 14.6px;
  font-weight: 400;
  padding: 2px 4px;
  text-shadow: var(--bar-tshadow);
  position: relative;
  overflow: hidden;
  display: flex;
  align-items: center;
  gap: 4px;
  margin-bottom: 7px;
}
.aero-bar::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 50%;
  background: var(--bar-glow-top);
  pointer-events: none;
}
.aero-bar .back-link {
  z-index: 1;
  flex-shrink: 0;
  padding: 2px 3px;
  display: flex;
  align-items: center;
  line-height: 0;
  text-decoration: none;
}
.aero-bar .back-link img {
  height: 30px;
  width: auto;
  object-fit: contain;
  display: block;
  filter: drop-shadow(0 1px 2px rgba(0,0,0,.80));
}
.aero-bar .back-link:hover img {
  filter: drop-shadow(0 0 6px rgba(255,255,255,.70)) drop-shadow(0 0 12px rgba(200,200,200,.45)) brightness(1.2);
}
.aero-bar .bar-title {
  flex: 1;
  text-align: center;
  z-index: 1;
  padding-right: 36px;
}

/* ── Glass Box ── */
.glass-box {
  background-image: linear-gradient(rgb(255 255 255 / 12%), rgb(0 0 0 / 100%));
  box-shadow: inset 0 1px 0 rgba(255,255,255,.07), inset 0 0 10px rgba(200,200,200,.04), 0 5px 6px rgba(0,0,0,.55);
  border: 1px solid var(--glass-border);
  padding: 5px;
  margin-bottom: 7px;
}
.aero-inner {
  border: 1px solid var(--aero-border);
  background: rgba(6,6,6,.92);
}
.aero-pad { padding: 10px 12px; }

/* ── h2 bar ── */
h2 {
  background: var(--bar-grad);
  box-shadow: inset 0 1px 0 var(--bar-shine), inset 0 2px 4px rgba(255,255,255,.10), 0 3px 10px rgba(0,0,0,.48);
  border: 1px solid var(--bar-border-s);
  border-top-color: var(--bar-border-t);
  border-bottom-color: var(--bar-border-b);
  padding: 5px 8px 7px;
  margin: 0;
  font-weight: 400;
  font-size: 13px;
  color: var(--bar-text);
  text-shadow: var(--bar-tshadow);
  position: relative;
  overflow: hidden;
}
h2::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 50%;
  background: var(--bar-glow-top);
  pointer-events: none;
}

/* ── Contact Links ── */
.contact-links {
  list-style: none;
  margin: 0;
  padding: 0;
}
.contact-links li {
  border-bottom: 1px solid rgba(30,30,30,.82);
}
.contact-links li:last-child {
  border-bottom: none;
}
.contact-links a {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 9px 14px;
  color: var(--text);
  font-size: 12.5px;
  text-decoration: none;
  font-family: Tahoma, sans-serif;
  position: relative;
  overflow: hidden;
  transition: color .15s;
}
.contact-links a:hover {
  background: var(--contact-hover);
  color: var(--accent);
  text-decoration: none;
}
.contact-links a .link-icon {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  object-fit: cover;
  flex-shrink: 0;
  pointer-events: none;
  filter: none !important;
  -webkit-filter: none !important;
}
.contact-links a .link-label {
  flex: 1;
  font-size: 12.5px;
}
.contact-links a .link-note {
  color: #666;
  font-size: 11px;
  white-space: nowrap;
}
.contact-links a:hover .link-note {
  color: #888;
}

/* ── Platform icon fallback (colored SVG badge) ── */
.icon-badge {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  font-weight: 700;
  letter-spacing: -.5px;
  text-shadow: 0 1px 2px rgba(0,0,0,.60);
}
.icon-badge.twitter  { background: #1d9bf0; color: #fff; }
.icon-badge.discord  { background: #5865f2; color: #fff; }
.icon-badge.lastfm   { background: #d51007; color: #fff; }
.icon-badge.mfc      { background: #e3a000; color: #fff; }
.icon-badge.email    { background: #555; color: #ddd; }
.icon-badge.youtube  { background: #ff0000; color: #fff; }
.icon-badge.github   { background: #24292e; color: #fff; border: 1px solid rgba(255,255,255,.18); }
.icon-badge.anilist  { background: #02a9ff; color: #fff; }

/* ── Note / info bar ── */
.note {
  background: rgba(6,6,6,.88);
  border: 1px solid rgba(70,70,70,.40);
  border-left: 2px solid rgba(100,100,100,.55);
  padding: 7px 10px;
  margin-top: 6px;
  font-size: 11px;
  color: #777;
  line-height: 1.65;
  text-align: center;
}

/* ── Divider section label ── */
.contact-section-label {
  font-size: 10px;
  color: #555;
  text-transform: uppercase;
  letter-spacing: 1.2px;
  padding: 6px 14px 3px;
  background: rgba(10,10,10,.60);
  border-bottom: 1px solid rgba(40,40,40,.70);
  font-family: Tahoma, sans-serif;
}

/* ── Sound toggle — fixed bottom left ── */
#soundToggle {
  position: fixed;
  bottom: 8px;
  left: 10px;
  z-index: 9999;
  font-family: Tahoma, sans-serif;
  font-size: 10px;
  color: rgba(140,140,140,.55);
  cursor: pointer;
  user-select: none;
  letter-spacing: .2px;
  padding: 2px 0;
  background: none;
  border: none;
  outline: none;
  transition: color .15s;
}
#soundToggle:hover { color: rgba(200,200,200,.80); }
#soundToggle.off   { color: rgba(90,90,90,.50); }

/* ── Mobile ── */
@media (max-width: 600px) {
  body {
    padding: 8px 4px 24px;
    font-size: 13px;
    background-size: contain;
    background-attachment: scroll;
    background-position: center center;
  }
  #pageWrap { width: 100%; }
  .aero-bar { font-size: 13px; }
  .aero-bar .back-link img { height: 26px; }
  .aero-bar .bar-title { padding-right: 0; font-size: 12px; }
  h2 { font-size: 12.5px; }
  .aero-pad { padding: 8px; }
  .contact-links a { padding: 10px 10px; gap: 10px; font-size: 12px; }
  .contact-links a .link-icon,
  .icon-badge { width: 32px; height: 32px; }
  #cornerLogo img { height: 28px; }
  .glass-box { padding: 4px; }
}
@media (max-width: 380px) {
  .aero-bar .bar-title { font-size: 11px; }
}
</style>

<!-- Sounds toggle — identical to downloader.html -->
<button id="soundToggle" onclick="toggleSound()">Sounds: On</button>

<script>
/* ── Sounds (identical to downloader.html) ── */
const SOUND_BASE = '../assets/audio/';
const SOUNDS = {
  start:   SOUND_BASE + 'sitestart.mp3',
  alert:   SOUND_BASE + 'sitealert.mp3',
  dislike: SOUND_BASE + 'sitedislikeclick.mp3',
  like:    SOUND_BASE + 'sitelikeclick.mp3',
  sort:    SOUND_BASE + 'sitesortclick.mp3',
  button:  SOUND_BASE + 'sitebuttonclick.mp3',
  hover:   SOUND_BASE + 'text.mp3',
};
let _soundsOn = true;
const _audioCache = {};
function _getAudio(key) {
  if (!_audioCache[key]) { const a = new Audio(SOUNDS[key]); a.preload='auto'; _audioCache[key]=a; }
  return _audioCache[key];
}
function playSound(key) {
  if (!_soundsOn) return;
  try {
    const clone = _getAudio(key).cloneNode();
    clone.volume = key==='hover' ? 0.30 : 0.52;
    clone.play().catch(()=>{});
  } catch(e) {}
}
function toggleSound() {
  _soundsOn = !_soundsOn;
  const btn = document.getElementById('soundToggle');
  if (btn) { btn.textContent = _soundsOn ? 'Sounds: On' : 'Sounds: Off'; btn.classList.toggle('off', !_soundsOn); }
  if (_soundsOn) playSound('button');
}

/* Sync sound state with sessionStorage (shared across pages) */
document.addEventListener('DOMContentLoaded', () => {
  const stored = sessionStorage.getItem('_soundsOn');
  if (stored === 'false') {
    _soundsOn = false;
    const btn = document.getElementById('soundToggle');
    if (btn) { btn.textContent = 'Sounds: Off'; btn.classList.add('off'); }
  }
  if (!sessionStorage.getItem('_siteStartPlayed')) {
    sessionStorage.setItem('_siteStartPlayed','1');
    setTimeout(()=>playSound('start'), 700);
  }
});

/* Persist toggle state */
const _origToggle = toggleSound;
window.toggleSound = function() {
  _origToggle();
  sessionStorage.setItem('_soundsOn', String(_soundsOn));
};

/* Preload on first interaction */
document.addEventListener('pointerdown', ()=>Object.keys(SOUNDS).forEach(k=>_getAudio(k)), {once:true,passive:true});

/* Hover sound throttle: 400ms */
let _hoverThrottle = 0, _hoverTimer = null;
function _isInteractive(el) {
  if (!el||el===document.body||el===document.documentElement) return false;
  const tag = el.tagName;
  if (tag==='BUTTON'||tag==='A'||tag==='SELECT') return true;
  if (tag==='INPUT'&&el.type!=='range') return true;
  const cs = window.getComputedStyle(el);
  if (cs&&cs.cursor==='pointer') return true;
  return false;
}
document.addEventListener('mouseover', e=>{
  if (e.target.id==='soundToggle') return;
  if (!_isInteractive(e.target)) return;
  clearTimeout(_hoverTimer);
  _hoverTimer = setTimeout(()=>{
    const now = Date.now();
    if (now-_hoverThrottle<400) return;
    _hoverThrottle = now;
    playSound('hover');
  }, 400);
},{passive:true});
document.addEventListener('mouseout', e=>{
  if (_isInteractive(e.target)) clearTimeout(_hoverTimer);
},{passive:true});
document.addEventListener('click', e=>{
  if (e.target.id==='soundToggle') return;
  if (_isInteractive(e.target)) playSound('button');
},true);
</script>
