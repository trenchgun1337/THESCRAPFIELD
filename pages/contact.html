<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact — Watanagashi Archive</title>
<link rel="icon" type="image/x-icon" href="/assets/images/satokoico.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Sawarabi+Gothic&display=swap">
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
*:focus { outline:none !important; }
::selection { background:rgba(80,80,80,.45); color:#fff; }

:root {
  --accent: #cc1a1a;
  --text: #111;
  --text-dim: #2c2c2c;
  --grad-bar: linear-gradient(to bottom,#efefef 0%,#d8d8d8 52%,#c4c4c4 52%,#d0d0d0 100%);
  --shadow: 0 2px 5px rgba(0,0,0,.15);
}

html { scrollbar-width:thin; scrollbar-color:rgba(120,120,120,.5) transparent; }
::-webkit-scrollbar { width:6px; }
::-webkit-scrollbar-thumb { background:rgba(120,120,120,.5); border-radius:3px; }

body {
  font-family:'Sawarabi Gothic','Sazanami Gothic',Tahoma,'Segoe UI',sans-serif;
  font-size:12px;
  background-color:#000;
  background-image: url('../assets/images/whitebg.jpeg');
  background-size: cover;
  background-attachment: fixed;
  background-position: center center;
  color:var(--text);
  min-height:100vh;
  padding:18px 6px 40px;
  display:flex; flex-direction:column; align-items:center;
}

img { -webkit-user-drag:none; user-select:none; }
a { color:#000; text-decoration:none; }

#pageWrap { width:800px; max-width:100%; display:flex; flex-direction:column; }

/* ── corner logo ── */
#cornerLogo {
  position:fixed; top:10px; right:14px; z-index:9998; line-height:0; text-decoration:none;
}
#cornerLogo img {
  height:36px; width:auto; object-fit:contain; display:block;
  opacity:.82; pointer-events:auto;
}
#cornerLogo:hover img { opacity:1; }

/* ── topbar ── */
.aero-bar {
  background: var(--grad-bar);
  border: 2px ridge #727272;
  box-shadow: var(--shadow);
  padding: 4px 10px;
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 7px;
}
.back-link {
  color: var(--accent);
  font-size: 11px;
  letter-spacing: 1px;
  text-transform: uppercase;
  text-decoration: none;
  background: none;
  border: none;
  padding: 0;
  cursor: pointer;
}
.back-link:hover { text-decoration: underline; }
.bar-title {
  flex:1; text-align:center;
  font-size:11px; letter-spacing:2px; text-transform:uppercase;
  color: var(--text);
}

/* ── main box ── */
#mainContent {
  background: #f2f2f2;
  border: 2px ridge #727272;
  box-shadow: #595959 1px 1px 12px 1px;
  width: 100%;
}

.rights-bar {
  display: block;
  background: #000;
  color: #fff;
  font-size: 11px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  padding: 5px 8px;
  width: 100%;
}

.glass-box {
  background: #ebebeb;
  border: 1px solid rgba(0,0,0,.20);
  padding: 5px;
  margin: 6px;
}
.aero-inner { border:1px solid rgba(0,0,0,.30); background:#f2f2f2; }

/* ── form layout ── */
.email-form-wrap {
  padding: 12px 14px 14px;
  display: flex;
  flex-direction: column;
  gap: 9px;
}

.field-label {
  font-size: 10px;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: #666;
  margin-bottom: 3px;
  display: block;
}
.field-optional { font-size:10px; color:#aaa; margin-left:4px; text-transform:none; letter-spacing:0; }

.form-input {
  width: 100%;
  background: #fff;
  border: 1px solid rgba(0,0,0,.28);
  border-top-color: rgba(0,0,0,.40);
  padding: 5px 8px;
  font-family: inherit;
  font-size: 12px;
  color: var(--text);
  box-shadow: inset 0 1px 3px rgba(0,0,0,.10);
}
.form-input:focus { border-color: rgba(204,26,26,.55); }

/* ── rich editor ── */
.editor-toolbar {
  display: flex;
  flex-wrap: wrap;
  gap: 2px;
  padding: 4px 6px;
  background: #e4e4e4;
  border: 1px solid rgba(0,0,0,.28);
  border-bottom: none;
}
.tb-btn {
  background: #f0f0f0;
  border: 1px solid rgba(0,0,0,.22);
  padding: 2px 7px;
  font-family: inherit;
  font-size: 11px;
  cursor: pointer;
  color: #222;
  min-width: 26px;
  text-align: center;
  line-height: 1.5;
}
.tb-btn:hover { background:#fff; border-color:rgba(0,0,0,.38); }
.tb-btn.active { background:#d0d0d0; }
.tb-sep { width:1px; background:rgba(0,0,0,.18); margin:2px 3px; }

.tb-color-wrap { display:flex; align-items:center; gap:3px; font-size:10px; color:#555; }
.tb-color-wrap input[type=color] { width:22px; height:22px; border:1px solid rgba(0,0,0,.25); padding:1px; cursor:pointer; background:none; }

.tb-size-wrap { display:flex; align-items:center; gap:3px; font-size:10px; color:#555; }
.tb-size-wrap select {
  font-family:inherit; font-size:11px; background:#f0f0f0;
  border:1px solid rgba(0,0,0,.22); padding:1px 3px; cursor:pointer; color:#222;
}

#msgEditor {
  width: 100%;
  min-height: 140px;
  background: #fff;
  border: 1px solid rgba(0,0,0,.28);
  border-top: none;
  padding: 8px 10px;
  font-family: inherit;
  font-size: 12px;
  color: var(--text);
  box-shadow: inset 0 1px 3px rgba(0,0,0,.10);
  overflow-y: auto;
  line-height: 1.6;
}
#msgEditor:empty::before {
  content: attr(data-placeholder);
  color: #aaa;
  pointer-events: none;
}
#msgEditor:focus { border-color: rgba(204,26,26,.55); outline:none !important; }

/* attachment area */
.attach-row {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}
.attach-btn {
  background: none;
  border: none;
  cursor: pointer;
  font-family: inherit;
  font-size: 11px;
  color: #555;
  padding: 0;
  text-decoration: underline;
  text-decoration-style: dotted;
}
.attach-btn:hover { color: var(--accent); }
#attachList { display:flex; flex-wrap:wrap; gap:5px; }
.attach-tag {
  background: #e0e0e0;
  border: 1px solid rgba(0,0,0,.18);
  padding: 2px 6px;
  font-size: 10px;
  display: flex; align-items:center; gap:4px;
  max-width: 180px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
}
.attach-tag .rm { cursor:pointer; color:#999; font-size:12px; line-height:1; flex-shrink:0; }
.attach-tag .rm:hover { color:var(--accent); }

/* anon toggle */
.anon-toggle {
  display: flex;
  align-items: center;
  gap: 6px;
  cursor: pointer;
  user-select: none;
  font-size: 11.5px;
  color: #555;
}
.anon-toggle input[type=checkbox] { cursor:pointer; accent-color:var(--accent); }

/* send btn — flat, no gloss */
.send-btn {
  align-self: flex-start;
  background: #d6d6d6;
  border: 1px solid rgba(0,0,0,.32);
  padding: 5px 20px;
  font-family: inherit;
  font-size: 11px;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--text);
  cursor: pointer;
}
.send-btn:hover { background: #c8c8c8; }
.send-btn:disabled { opacity:.5; cursor:default; }

#statusMsg { font-size:11.5px; min-height:16px; color:#555; }
#statusMsg.ok  { color:#2a7a2a; }
#statusMsg.err { color:var(--accent); }

.note {
  background:#f5f5f5;
  border:1px solid rgba(0,0,0,.25);
  border-left:3px solid rgba(120,120,120,.50);
  padding:7px 10px;
  font-size:11px; color:var(--text-dim); line-height:1.65;
  text-align:center;
}

/* sound toggle */
#soundToggle {
  position:fixed; bottom:8px; left:10px; z-index:9999;
  font-family:inherit; font-size:10px; color:rgba(0,0,0,.40);
  cursor:pointer; user-select:none; background:none; border:none;
}
#soundToggle:hover { color:rgba(0,0,0,.70); }
#soundToggle.off   { color:rgba(0,0,0,.22); }

@media (max-width:800px) { #pageWrap { width:100%; } }
@media (max-width:600px) { body { padding:8px 4px 24px; background-attachment:scroll; } }
</style>
</head>
<body>

<a id="cornerLogo" href="../index.html" title="Watanagashi Archive — Home">
  <img src="../assets/images/watanagashilogo.png" alt="Watanagashi Archive" onerror="this.style.display='none'">
</a>

<div id="pageWrap">

  <div class="aero-bar">
    <a class="back-link" href="../index.html">back</a>
    <span class="bar-title">contact me</span>
  </div>

  <div id="mainContent">

    <div class="rights-bar">Send a Message</div>
    <div class="glass-box">
      <div class="aero-inner">
        <div class="email-form-wrap">

          <!-- anon -->
          <label class="anon-toggle">
            <input type="checkbox" id="anonCheck" onchange="toggleAnon()">
            send anonymously
          </label>

          <!-- name -->
          <div id="nameField">
            <label class="field-label" for="senderName">Name <span class="field-optional">— optional</span></label>
            <input class="form-input" type="text" id="senderName" placeholder="your name (or leave blank)">
          </div>

          <!-- email -->
          <div id="emailField">
            <label class="field-label" for="senderEmail">Your email <span class="field-optional">— optional, for reply</span></label>
            <input class="form-input" type="email" id="senderEmail" placeholder="your email address">
          </div>

          <!-- subject -->
          <div>
            <label class="field-label" for="msgSubject">Subject <span class="field-optional">— optional</span></label>
            <input class="form-input" type="text" id="msgSubject" placeholder="subject">
          </div>

          <!-- rich editor -->
          <div>
            <label class="field-label">Message</label>

            <div class="editor-toolbar" id="editorToolbar">
              <button class="tb-btn" title="Bold" onmousedown="event.preventDefault();fmt('bold')"><b>B</b></button>
              <button class="tb-btn" title="Italic" onmousedown="event.preventDefault();fmt('italic')"><i>I</i></button>
              <button class="tb-btn" title="Underline" onmousedown="event.preventDefault();fmt('underline')"><u>U</u></button>
              <button class="tb-btn" title="Strikethrough" onmousedown="event.preventDefault();fmt('strikeThrough')"><s>S</s></button>
              <div class="tb-sep"></div>
              <button class="tb-btn" title="Align Left" onmousedown="event.preventDefault();fmt('justifyLeft')">&#8676;</button>
              <button class="tb-btn" title="Align Center" onmousedown="event.preventDefault();fmt('justifyCenter')">&#8660;</button>
              <button class="tb-btn" title="Align Right" onmousedown="event.preventDefault();fmt('justifyRight')">&#8677;</button>
              <div class="tb-sep"></div>
              <button class="tb-btn" title="Bullet list" onmousedown="event.preventDefault();fmt('insertUnorderedList')">&#8226; list</button>
              <button class="tb-btn" title="Numbered list" onmousedown="event.preventDefault();fmt('insertOrderedList')">1. list</button>
              <div class="tb-sep"></div>
              <button class="tb-btn" title="Insert link" onmousedown="event.preventDefault();insertLink()">link</button>
              <button class="tb-btn" title="Insert image URL" onmousedown="event.preventDefault();insertImage()">img</button>
              <div class="tb-sep"></div>
              <div class="tb-color-wrap">
                <span>color</span>
                <input type="color" id="txtColor" value="#111111" onchange="fmt('foreColor',this.value)" title="Text color">
              </div>
              <div class="tb-sep"></div>
              <div class="tb-size-wrap">
                <span>size</span>
                <select onchange="fmt('fontSize',this.value)" title="Font size">
                  <option value="1">xs</option>
                  <option value="2">sm</option>
                  <option value="3" selected>md</option>
                  <option value="4">lg</option>
                  <option value="5">xl</option>
                  <option value="6">2xl</option>
                </select>
              </div>
              <div class="tb-sep"></div>
              <button class="tb-btn" title="Clear formatting" onmousedown="event.preventDefault();fmt('removeFormat')">clear</button>
            </div>

            <div id="msgEditor"
              contenteditable="true"
              data-placeholder="write your message here..."
              spellcheck="true">
            </div>
          </div>

          <!-- attachments -->
          <div>
            <label class="field-label">Attachments <span class="field-optional">— files will be listed in the email body</span></label>
            <div class="attach-row">
              <button class="attach-btn" type="button" onclick="document.getElementById('fileInput').click()">+ attach file</button>
              <input type="file" id="fileInput" multiple style="display:none" onchange="handleFiles(this.files)">
              <div id="attachList"></div>
            </div>
          </div>

          <button class="send-btn" id="sendBtn" onclick="sendMsg()">Send</button>
          <div id="statusMsg"></div>

          <div class="note">
            name and email are optional — you can send anonymously.<br>
            attached files will be listed by name (content not transmitted via email).<br>
            for file transfers, mention it in the message and i'll get back to you.
          </div>

        </div>
      </div>
    </div>

  </div>
</div>

<button id="soundToggle" onclick="toggleSound()">Sounds: On</button>

<script>
emailjs.init({ publicKey: 'iww-r-sgJVyoRmokf' });

const SERVICE_ID  = 'service_ina2cb8';
const TEMPLATE_ID = 'template_g7owumb';

/* ── anon toggle ── */
function toggleAnon() {
  const hide = document.getElementById('anonCheck').checked;
  document.getElementById('nameField').style.display  = hide ? 'none' : '';
  document.getElementById('emailField').style.display = hide ? 'none' : '';
}

/* ── rich text ── */
function fmt(cmd, val) {
  document.getElementById('msgEditor').focus();
  document.execCommand(cmd, false, val || null);
}
function insertLink() {
  const url = prompt('Enter URL:');
  if (url) { document.getElementById('msgEditor').focus(); document.execCommand('createLink', false, url); }
}
function insertImage() {
  const url = prompt('Enter image URL:');
  if (url) { document.getElementById('msgEditor').focus(); document.execCommand('insertImage', false, url); }
}

/* ── attachments ── */
const attachedFiles = [];
function handleFiles(files) {
  Array.from(files).forEach(f => {
    if (attachedFiles.find(x => x.name === f.name && x.size === f.size)) return;
    attachedFiles.push(f);
    renderAttachList();
  });
  document.getElementById('fileInput').value = '';
}
function removeAttach(idx) {
  attachedFiles.splice(idx, 1);
  renderAttachList();
}
function renderAttachList() {
  const el = document.getElementById('attachList');
  el.innerHTML = attachedFiles.map((f,i) =>
    `<span class="attach-tag" title="${f.name}">${f.name} <span class="rm" onclick="removeAttach(${i})">×</span></span>`
  ).join('');
}

/* ── send ── */
async function sendMsg() {
  const anon    = document.getElementById('anonCheck').checked;
  const name    = anon ? 'Anonymous' : (document.getElementById('senderName').value.trim() || 'Anonymous');
  const email   = anon ? 'anonymous@noreply.com' : (document.getElementById('senderEmail').value.trim() || 'anonymous@noreply.com');
  const subject = document.getElementById('msgSubject').value.trim() || '(no subject)';
  const editor  = document.getElementById('msgEditor');
  const msgHTML = editor.innerHTML.trim();
  const msgText = editor.innerText.trim();

  const status = document.getElementById('statusMsg');
  const btn    = document.getElementById('sendBtn');

  if (!msgText) { status.textContent = 'please write a message first.'; status.className = 'err'; return; }

  let attachNote = '';
  if (attachedFiles.length) {
    attachNote = '\n\n--- Attached files ---\n' + attachedFiles.map(f => `• ${f.name} (${(f.size/1024).toFixed(1)} KB)`).join('\n');
  }

  btn.disabled = true;
  status.className = '';
  status.textContent = 'sending...';

  try {
    await emailjs.send(SERVICE_ID, TEMPLATE_ID, {
      from_name:  name,
      from_email: email,
      subject:    subject,
      message:    msgText + attachNote,
      message_html: msgHTML + (attachNote ? '<pre style="font-size:11px;color:#666;">'+attachNote+'</pre>' : ''),
    });
    status.textContent = 'message sent!';
    status.className = 'ok';
    editor.innerHTML = '';
    document.getElementById('msgSubject').value = '';
    attachedFiles.length = 0;
    renderAttachList();
    if (!anon) {
      document.getElementById('senderName').value  = '';
      document.getElementById('senderEmail').value = '';
    }
  } catch(e) {
    status.textContent = 'failed to send. email directly: trenchgun1337@gmail.com';
    status.className = 'err';
    console.error(e);
  }
  btn.disabled = false;
}

/* ── sounds ── */
const SOUND_BASE = '../assets/audio/';
const SOUNDS = { start:'sitestart.mp3', button:'sitebuttonclick.mp3' };
let _soundsOn = true;
const _ac = {};
function _ga(k){if(!_ac[k]){const a=new Audio(SOUND_BASE+SOUNDS[k]);a.preload='auto';_ac[k]=a;}return _ac[k];}
function playSound(k){if(!_soundsOn||!SOUNDS[k])return;try{const c=_ga(k).cloneNode();c.volume=.52;c.play().catch(()=>{});}catch(e){}}
function toggleSound(){_soundsOn=!_soundsOn;const b=document.getElementById('soundToggle');if(b){b.textContent=_soundsOn?'Sounds: On':'Sounds: Off';b.classList.toggle('off',!_soundsOn);}if(_soundsOn)playSound('button');sessionStorage.setItem('_soundsOn',String(_soundsOn));}
document.addEventListener('DOMContentLoaded',()=>{
  const s=sessionStorage.getItem('_soundsOn');
  if(s==='false'){_soundsOn=false;const b=document.getElementById('soundToggle');if(b){b.textContent='Sounds: Off';b.classList.add('off');}}
  if(!sessionStorage.getItem('_siteStartPlayed')){sessionStorage.setItem('_siteStartPlayed','1');setTimeout(()=>playSound('start'),700);}
});
document.addEventListener('click',e=>{if(e.target.id==='soundToggle')return;const t=e.target.tagName;if(t==='BUTTON'||t==='A')playSound('button');},true);
</script>
</body>
</html>
