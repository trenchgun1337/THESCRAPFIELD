<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact — Watanagashi Archive</title>
<link rel="icon" type="image/x-icon" href="/assets/images/satokoico.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Sawarabi+Gothic&display=swap">
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
*:focus { outline:none !important; }
::selection { background:rgba(80,80,80,.45); color:#fff; }

:root {
  --accent: #cc1a1a;
  --text: #111;
}

html { scrollbar-width:thin; scrollbar-color:rgba(120,120,120,.5) transparent; }
::-webkit-scrollbar { width:6px; }
::-webkit-scrollbar-thumb { background:rgba(120,120,120,.5); border-radius:3px; }

body {
  font-family:'Sawarabi Gothic','Sazanami Gothic',Tahoma,'Segoe UI',sans-serif;
  font-size:12px;
  background-color:#000000;
  background-image: url('../assets/images/whitebg.jpeg');
  background-size: 74%;
  background-attachment: fixed;
  background-repeat: no-repeat;
  background-position: center center;
  color:var(--text);
  min-height:100vh;
  padding:18px 6px 40px;
  display:flex; flex-direction:column; align-items:center;
}

img { -webkit-user-drag:none; user-select:none; }
a { color:#000; text-decoration:none; }

#pageWrap { width:800px; max-width:100%; display:flex; flex-direction:column; gap:7px; }

#cornerLogo { position:fixed; top:10px; right:14px; z-index:9998; line-height:0; }
#cornerLogo img { height:36px; width:auto; opacity:.82; display:block; }
#cornerLogo:hover img { opacity:1; }

.aero-bar {
  background: #d8d8d8;
  border: 2px ridge #727272;
  box-shadow: 0 2px 5px rgba(0,0,0,.15);
  padding: 4px 10px;
  display: flex; align-items: center; gap: 8px;
}
.back-link {
  color: var(--accent); font-size:11px; letter-spacing:1px;
  text-transform:uppercase; background:none; border:none; padding:0; cursor:pointer;
}
.back-link:hover { text-decoration:underline; }
.bar-title { flex:1; text-align:center; font-size:12px; letter-spacing:.5px; text-transform:uppercase; }

#postFormWrap {
  background: #d8d8d8;
  border: 1px solid #b7c5d9;
  font-family: arial, helvetica, sans-serif;
  font-size: 13px;
  color: #000;
  padding: 6px;
}

.chan-outer {
  width: 100%;
  border-collapse: collapse;
  border: 1px solid #a0a0a0;
  background: #d8d8d8;
}

.chan-label {
  background: #b2b2b3;
  border: 1px solid #858585;
  font-size: 12px;
  font-weight: bold;
  color: #000;
  padding: 4px 8px;
  white-space: nowrap;
  vertical-align: middle;
  width: 90px;
  text-align: left;
}

.chan-field {
  background: #d8d8d8;
  border: 1px solid #b2b2b3;
  padding: 3px 5px;
  vertical-align: middle;

  height: 120px;        /* força altura */
  max-height: 120px;    /* impede crescimento */
  overflow: hidden;     /* corta excesso */
}

.chan-input {
  background: #fff;
  border: 1px inset #aaa;
  padding: 2px 4px;
  font-family: arial, helvetica, sans-serif;
  font-size: 13px;
  color: #000;
  width: 280px;
}
.chan-input:focus { outline: none !important; }
.chan-input[disabled] { background: #e8e8e8; color: #666; }

.post-row-inner {
  display: flex;
  align-items: center;
  gap: 6px;
}

.chan-post-btn {
  background: #d8d8d8;
  border: 1px outset #999;
  padding: 2px 12px;
  font-family: arial, helvetica, sans-serif;
  font-size: 13px;
  color: #000;
  cursor: pointer;
  white-space: nowrap;
}
.chan-post-btn:hover { background: #c8c8c8; }
.chan-post-btn:active { border-style: inset; }
.chan-post-btn:disabled { opacity:.5; cursor:default; }

/* Editor: fixed height, no overflow growth */
#msgEditor {
  background: #fff;
  border: 1px inset #aaa;
  display: block;
  white-space: pre-wrap;
  height: 120px;        
  width: 100%;

  padding: 3px 4px;
  font-family: arial, helvetica, sans-serif;
  font-size: 13px;
  line-height: 1.5;

  overflow-y: auto;     
  overflow-x: hidden;

  resize: none;         
}
#msgEditor:empty::before {
  content: attr(data-placeholder);
  color: #aaa;
  pointer-events: none;
}

.chan-file-inner {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
}
.chan-file-btn {
  background: #d8d8d8;
  border: 1px outset #999;
  padding: 2px 8px;
  font-family: arial, helvetica, sans-serif;
  font-size: 12px;
  color: #000;
  cursor: pointer;
  white-space: nowrap;
}
.chan-file-btn:hover { background: #c8c8c8; }
.chan-file-name { font-size: 12px; color: #555; }
#imgFileInput { display: none; }

#removeBtn {
  font-family: arial, helvetica, sans-serif;
  font-size: 12px;
  color: #cc0000;
  cursor: pointer;
  white-space: nowrap;
  display: none;

  background: none;     
  border: none;        
  outline: none;       

}
#removeBtn:hover { background: #f0d0d0; }
#removeBtn:active { border-style: inset; }

.chan-footer-note {
  font-size: 11px;
  color: #333;
  margin-top: 5px;
}

#statusMsg { font-size:11px; color:#666; }
#statusMsg.ok  { color:#117743; font-weight:bold; }
#statusMsg.err { color:#cc0000; font-weight:bold; }

/* ── PREVIEW ── */
#previewSection {
  border: 2px ridge #727272;
  background: #f2f2f2;
  display: flex;
  flex-direction: column;
}
#previewTitle {
  background: #000;
  color: #ddd;
  font-size: 11px;
  letter-spacing: 1px;
  padding: 5px 10px;
  user-select: none;
  text-transform: uppercase;
}
#previewBody {
  padding: 14px 16px;
  background: #fff;
  font-family: arial, helvetica, sans-serif;
  font-size: 13px;
  overflow: hidden;
}

.chan-post-box {
  background: #d6daf0;
  border: 1px solid #b7c5d9;
  padding: 8px 10px;
  display: inline-block;
  min-width: 220px;
  max-width: 100%;
  overflow: hidden;
}
.chan-post-meta { font-size: 12px; margin-bottom: 6px; line-height: 1.4; }
.chan-post-name { color: #117743; font-weight: bold; }
.chan-post-time { color: #444; margin-left: 6px; font-size: 11px; }
.chan-post-no   { color: #000; margin-left: 4px; font-size: 11px; }

@media (max-width:800px) { #pageWrap { width:100%; } }
@media (max-width:600px) { body { padding:8px 4px 24px; background-attachment:scroll; } }
</style>
</head>
<body>

<a id="cornerLogo" href="../index.html" title="Watanagashi Archive — Home">
  <img src="/assets/images/watanagashilogo.png" alt="Watanagashi Archive" onerror="this.style.display='none'">
</a>

<div id="pageWrap">

  <div class="aero-bar">
    <a class="back-link" href="../index.html">back</a>
    <span class="bar-title">contact</span>
  </div>

  <div id="postFormWrap">
    <table class="chan-outer">
      <tbody>

        <!-- Name -->
        <tr>
          <td class="chan-label">Name</td>
          <td class="chan-field">
            <input class="chan-input" type="text" value="Anonymous" disabled>
          </td>
        </tr>

        <!-- Post button row (before file) -->
        <tr>
          <td class="chan-label"></td>
          <td class="chan-field">
            <div class="post-row-inner">
              <button class="chan-post-btn" id="sendBtn" onclick="sendMsg()">Post</button>
              <div id="statusMsg"></div>
            </div>
          </td>
        </tr>

        <!-- Content -->
        <tr>
          <td class="chan-label" style="vertical-align:top; padding-top:6px;">Content</td>
          <td class="chan-field">
            <div
              id="msgEditor"
              contenteditable="true"
              data-placeholder=""
              spellcheck="true"
            ></div>
          </td>
        </tr>

        <!-- File (after Post button, after Content) -->
        <tr>
          <td class="chan-label">File</td>
          <td class="chan-field">
            <div class="chan-file-inner">
              <button class="chan-file-btn" onclick="document.getElementById('imgFileInput').click()">Choose file</button>
              <span class="chan-file-name" id="fileNameDisplay">No file chosen</span>
              <button id="removeBtn" onclick="removeAttachment()">Remove attachment</button>
              <input type="file" id="imgFileInput" accept="image/jpeg,image/png,image/gif,image/webp" onchange="insertImage(event)">
            </div>
          </td>
        </tr>

      </tbody>
    </table>
    <div class="chan-footer-note">• Please be kind to me.</div>
  </div>

  <!-- PREVIEW -->
  <div id="previewSection">
    <div id="previewTitle">Preview — how the email will look</div>
    <div id="previewBody">
      <div style="color:#777;font-size:11px;margin-bottom:8px;">
        anonymous message — watanagashiarchive.vercel.app/contact
      </div>
      <div class="chan-post-box">
        <div class="chan-post-meta">
          <span class="chan-post-name">Anonymous</span>
          <span class="chan-post-time" id="previewTime"></span>
          <span class="chan-post-no" id="previewNo"></span>
        </div>
        <div id="previewMsg" style="overflow:hidden; line-height:1.6;">
          <span style="color:#bbb;">your message will appear here...</span>
        </div>
        <div style="clear:both;"></div>
      </div>
    </div>
  </div>

</div>

<script>
emailjs.init({ publicKey: 'iww-r-sgJVyoRmokf' });

const CLOUD_NAME    = 'dagsxkazw';
const UPLOAD_PRESET = 'unsigned_upload';
const SERVICE_ID    = 'service_ina2cb8';
const TEMPLATE_ID   = 'template_g7owumb';

// ─────────────────────────────────────────────
// COUNTER  (CountAPI — free, persistent)
// First-time setup: open browser console and run:
//   fetch('https://api.countapi.xyz/set/watanagashi-archive/posts?value=23818223')
// That seeds the counter so the first post is No.23818224.
// ─────────────────────────────────────────────
// ─────────────────────────────────────────────
// COUNTER (via backend seguro)
// ─────────────────────────────────────────────
let nextPostNumber = '?';
async function loadPostNumber() {
  try {
    const res = await fetch('/api/getcount');

    // 🔥 evita crash
    if (!res.ok) throw new Error('API failed');

    const data = await res.json();

    nextPostNumber = (data.value || 0) + 1;

  } catch (err) {
    console.error(err);
    nextPostNumber = '?';
  }

  document.getElementById('previewNo').textContent = 'No.' + nextPostNumber;
}

async function incrementPostCount() {
  try {
    const res = await fetch('/api/increment', {
      method: 'POST'
    });

if (!res.ok) return nextPostNumber;

const data = await res.json();
return data.value;

  } catch (err) {
    console.error(err);
    return nextPostNumber;
  }
}

// iniciar contador
loadPostNumber();

// ─────────────────────────────────────────────
// TIME  — chan format  MM/DD/YY(Day)HH:MM:SS
// ─────────────────────────────────────────────
function getChanTime() {
  const now  = new Date();
  const mm   = String(now.getMonth() + 1).padStart(2, '0');
  const dd   = String(now.getDate()).padStart(2, '0');
  const yy   = String(now.getFullYear()).slice(2);
  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const day  = days[now.getDay()];
  const hh   = String(now.getHours()).padStart(2, '0');
  const min  = String(now.getMinutes()).padStart(2, '0');
  const ss   = String(now.getSeconds()).padStart(2, '0');
  return `${mm}/${dd}/${yy}(${day})${hh}:${min}:${ss}`;
}

// ─────────────────────────────────────────────
// EDITOR SETUP
// ─────────────────────────────────────────────
const editor      = document.getElementById('msgEditor');
const previewMsg  = document.getElementById('previewMsg');
const previewTime = document.getElementById('previewTime');

previewTime.textContent = getChanTime();
setInterval(() => { previewTime.textContent = getChanTime(); }, 1000);

editor.addEventListener('input', updatePreview);

// ── Block image paste; allow plain text only ──
editor.addEventListener('paste', (e) => {
  e.preventDefault();
  const text = e.clipboardData.getData('text/plain');
  if (text) document.execCommand('insertText', false, text);
});

// ── Block drag of images inside editor ──
editor.addEventListener('dragstart', (e) => {
  if (e.target.tagName === 'IMG') e.preventDefault();
});

// ── Redirect clicks before image to after it ──
editor.addEventListener('click', () => {
  const img = editor.querySelector('img');
  if (!img) return;
  requestAnimationFrame(() => {
    const sel = window.getSelection();
    if (!sel || !sel.rangeCount) return;
    const range = sel.getRangeAt(0);

    let isBefore = false;
    if (range.startContainer === editor) {
      const imgIdx = Array.from(editor.childNodes).indexOf(img);
      isBefore = range.startOffset <= imgIdx;
    } else {
      const pos = img.compareDocumentPosition(range.startContainer);
      isBefore = !!(pos & Node.DOCUMENT_POSITION_PRECEDING);
    }

    if (isBefore) {
      let node = img.nextSibling;
      while (node && node.nodeType !== Node.TEXT_NODE) node = node.nextSibling;
      if (!node) {
        node = document.createTextNode('\u200B');
        editor.appendChild(node);
      }
      const newRange = document.createRange();
      newRange.setStart(node, node.length);
      newRange.collapse(true);
      sel.removeAllRanges();
      sel.addRange(newRange);
    }
  });
});

// ── Protect .pic-specs and img from keyboard deletion ──
editor.addEventListener('keydown', (e) => {
  if (e.key !== 'Backspace' && e.key !== 'Delete') return;
  const sel = window.getSelection();
  if (!sel || !sel.rangeCount) return;
  const range = sel.getRangeAt(0);

  const frag = range.cloneContents();
  if (frag.querySelector && frag.querySelector('.pic-specs')) {
    e.preventDefault();
    return;
  }

  if (range.collapsed) {
    const container = range.startContainer;
    const offset    = range.startOffset;

    if (e.key === 'Backspace') {
      let prev = null;
      if (container.nodeType === Node.TEXT_NODE && offset === 0)
        prev = container.previousSibling;
      else if (container.nodeType !== Node.TEXT_NODE && offset > 0)
        prev = container.childNodes[offset - 1];
      if (prev && prev.classList && prev.classList.contains('pic-specs')) {
        e.preventDefault();
      }
      if (prev && prev.tagName === 'IMG') {
        e.preventDefault();
      }
    }

    if (e.key === 'Delete') {
      let next = null;
      if (container.nodeType === Node.TEXT_NODE && offset === container.length)
        next = container.nextSibling;
      else if (container.nodeType !== Node.TEXT_NODE)
        next = container.childNodes[offset];
      if (next && next.classList && next.classList.contains('pic-specs')) {
        e.preventDefault();
      }
      if (next && next.tagName === 'IMG') {
        e.preventDefault();
      }
    }
  }
});

// ─────────────────────────────────────────────
// PREVIEW  (inline, uses CSS float)
// ─────────────────────────────────────────────
function updatePreview() {
  const text   = editor.innerText.replace(/\u200B/g, '').trim();
  const hasImg = !!editor.querySelector('img');
  if (text || hasImg) {
    previewMsg.innerHTML = buildPreviewHTML(editor.innerHTML);
  } else {
    previewMsg.innerHTML = '<span style="color:#bbb;">your message will appear here...</span>';
  }
}

function buildPreviewHTML(html) {
  const tmp = document.createElement('div');
  tmp.innerHTML = html.replace(/\u200B/g, '');

  tmp.querySelectorAll('img').forEach(img => {
    img.removeAttribute('style');
    img.style.cssText = 'float:left;max-width:200px;max-height:200px;margin:0 12px 8px 0;border:1px solid #aaa;display:block;';
  });
  tmp.querySelectorAll('.pic-specs').forEach(el => {
    el.removeAttribute('contenteditable');
    el.style.cssText = 'font-family:monospace;font-size:11px;color:#cc0000;margin:0 0 2px;display:block;clear:both;';
  });

  return tmp.innerHTML;
}

// ─────────────────────────────────────────────
// EMAIL HTML  (table layout for reliable clients)
// ─────────────────────────────────────────────
function buildEmailHTML(html) {
  const tmp = document.createElement('div');
  tmp.innerHTML = html.replace(/\u200B/g, '');

  const img   = tmp.querySelector('img');
  const specs = tmp.querySelector('.pic-specs');

  if (img) {
    const specsHTML = specs
      ? `<div style="font-family:monospace;font-size:11px;color:#cc0000;margin:0 0 4px;display:block;">${escapeHtml(specs.textContent)}</div>`
      : '';

    if (specs) specs.remove();
    img.remove();
    const textHTML = tmp.innerHTML.trim();

    return `${specsHTML}` +
      `<table role="presentation" style="border-collapse:collapse;margin:0;">` +
        `<tr>` +
          `<td style="vertical-align:top;padding-right:10px;">` +
            `<img src="${escapeAttr(img.src)}" style="max-width:200px;max-height:200px;border:1px solid #ccc;display:block;">` +
          `</td>` +
          `<td style="vertical-align:top;font-size:13px;line-height:1.6;">` +
            `${textHTML || '&nbsp;'}` +
          `</td>` +
        `</tr>` +
      `</table>`;
  }

  return tmp.innerHTML;
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function escapeAttr(str) {
  return str.replace(/"/g, '&quot;');
}

// ─────────────────────────────────────────────
// IMAGE UPLOAD
// ─────────────────────────────────────────────
async function uploadToCloudinary(file) {
  const fd = new FormData();
  fd.append('file', file);
  fd.append('upload_preset', UPLOAD_PRESET);
  const res  = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, { method:'POST', body:fd });
  const data = await res.json();
  if (!data.secure_url) throw new Error('upload failed');
  return data.secure_url;
}

async function insertImage(event) {
  const file = event.target.files[0];
  if (!file) return;

  const status      = document.getElementById('statusMsg');
  const fileDisplay = document.getElementById('fileNameDisplay');
  const removeBtn   = document.getElementById('removeBtn');
  const fileName    = file.name;
  const fileSizeKB  = (file.size / 1024).toFixed(1);

  if (file.size > 400 * 1024) {
    status.textContent = 'Image too large (max 400 KB).';
    status.className   = 'err';
    event.target.value = '';
    return;
  }

  status.textContent = 'Uploading...';
  status.className   = '';

  // Measure dimensions before upload
  const tmpURL = URL.createObjectURL(file);
  const tmpImg = new Image();
  tmpImg.src   = tmpURL;
  await new Promise(res => { tmpImg.onload = res; tmpImg.onerror = res; });
  const w = tmpImg.naturalWidth;
  const h = tmpImg.naturalHeight;
  URL.revokeObjectURL(tmpURL);

  // Preserve existing text
  const existingText = editor.innerText.replace(/\u200B/g, '').trim();

  try {
    const imgUrl = await uploadToCloudinary(file);

    // Build: [specs] [img float:left] [text node]
    const specs = document.createElement('div');
    specs.className       = 'pic-specs';
    specs.contentEditable = 'false';
    specs.style.cssText   = 'font-family:monospace;font-size:11px;color:#cc0000;margin:0 0 2px;display:block;cursor:default;clear:both;';
    specs.textContent     = `File: ${fileName} (${fileSizeKB} KB, ${w}×${h})`;

    const img = document.createElement('img');
    img.src           = imgUrl;
    img.style.cssText = 'float:left;max-width:200px;max-height:200px;margin:0 12px 8px 0;border:1px solid #aaa;display:block;';

    // Text node: existing text or zero-width space so cursor has somewhere to land
    const textNode = document.createTextNode(existingText || '\u200B');

    editor.innerHTML = '';
    editor.appendChild(specs);
    editor.appendChild(img);
    editor.appendChild(textNode);

    // Place cursor at end of text node
    editor.focus();
    const range = document.createRange();
    range.setStart(textNode, textNode.length);
    range.collapse(true);
    const sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(range);

    fileDisplay.textContent     = fileName;
    removeBtn.style.display     = 'inline-block';
    status.textContent = 'Image uploaded!';
    status.className   = 'ok';

  } catch (err) {
    status.textContent = 'Upload failed.';
    status.className   = 'err';
    console.error(err);
  }

  event.target.value = '';
  updatePreview();
}

// ─────────────────────────────────────────────
// REMOVE ATTACHMENT
// ─────────────────────────────────────────────
function removeAttachment() {
  editor.querySelectorAll('img').forEach(el => el.remove());
  editor.querySelectorAll('.pic-specs').forEach(el => el.remove());

  document.getElementById('fileNameDisplay').textContent = '';
  document.getElementById('removeBtn').style.display    = 'none';
  document.getElementById('statusMsg').textContent      = '';
  document.getElementById('statusMsg').className        = '';

  // Clean up any dangling zero-width spaces
  editor.innerHTML = editor.innerHTML.replace(/\u200B/g, '');

  updatePreview();
  editor.focus();
}

// ─────────────────────────────────────────────
// SEND
// ─────────────────────────────────────────────
async function sendMsg() {
  const rawText = editor.innerText.replace(/\u200B/g, '').trim();
  const hasImg  = !!editor.querySelector('img');
  const status  = document.getElementById('statusMsg');
  const btn     = document.getElementById('sendBtn');

  if (!rawText && !hasImg) {
    status.textContent = 'Write something first.';
    status.className   = 'err';
    return;
  }

if (btn.disabled) return;
btn.disabled = true;  status.className   = '';

  status.textContent = 'Sending...';

  const postNumber = await incrementPostCount() || nextPostNumber;
  const timeStr    = getChanTime();
  const finalHTML  = buildEmailHTML(editor.innerHTML);

  try {
    await emailjs.send(SERVICE_ID, TEMPLATE_ID, {
      name:    'Anonymous',
      from_email:   'anonymous@noreply.com',
      subject:      'anonymous message — watanagashi archive',
      message:      rawText,
      message_html: finalHTML,
      time:         timeStr,
      post_number:  postNumber,
    });

    status.textContent = `Post sent! No.${postNumber}`;
    status.className   = 'ok';

    editor.innerHTML     = '';
    previewMsg.innerHTML = '<span style="color:#bbb;">your message will appear here...</span>';

    document.getElementById('fileNameDisplay').textContent = '';
    document.getElementById('removeBtn').style.display    = 'none';

    nextPostNumber = typeof postNumber === 'number' ? postNumber + 1 : '?';
document.getElementById('previewNo').textContent = 'No.' + nextPostNumber;
  } catch (err) {
    status.textContent = 'Failed — trenchgun1337@gmail.com';
    status.className   = 'err';
    console.error(err);
  }

  btn.disabled = false;
}
</script>
</body>
</html>
