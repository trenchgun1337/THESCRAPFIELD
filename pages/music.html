<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music Player — Watanagashi Archive</title>
<link rel="icon" type="image/x-icon" href="../assets/images/favicon.ico">
<link rel="stylesheet" href="../scripts/css/style.css">
<style>
/* ── Reset ── */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
* { -webkit-tap-highlight-color: transparent; }
::selection { background: rgba(204,26,26,.35) !important; color:#fff !important; }
::-moz-selection { background: rgba(204,26,26,.35) !important; color:#fff !important; }
*:focus { outline: none !important; }
button:active, button:focus, button:focus-visible { outline:none !important; box-shadow:none !important; }

:root {
  --accent:       #cc1a1a;
  --text:         #c8c8c8;
  --green:        #3cda56;
  --glass-border: rgba(150,150,150,.40);
  --aero-border:  rgba(140,140,140,.40);
  --bar-grad: linear-gradient(to bottom,
    rgba(255,255,255,.22) 0%, rgba(185,185,185,.88) 0%,
    rgba(120,120,120,.76) 4%, rgba(26,26,26,.98) 52%,
    rgba(4,4,4,1) 52%, rgba(14,14,14,.99) 100%);
  --bar-shine:    rgba(255,255,255,.24);
  --bar-border-t: rgba(255,255,255,.18);
  --bar-border-b: rgba(0,0,0,.88);
  --bar-border-s: rgba(140,140,140,.44);
  --bar-glow-top: linear-gradient(180deg,rgba(255,255,255,.14) 0%,rgba(200,200,200,.02) 100%);
  --bar-text:     #f2f2f2;
  --bar-tshadow:  0 1px 3px rgba(0,0,0,.98), 0 0 10px rgba(200,200,200,.20);
  --th-accent: #cc1a1a;
  --th-player-filter: sepia(100%) saturate(6) hue-rotate(300deg) brightness(1.1);
}

html {
  scrollbar-width: thin;
  scrollbar-color: rgba(10,10,10,.62) transparent;
}
::-webkit-scrollbar { width:7px; height:7px; background:transparent; }
::-webkit-scrollbar-track { background:rgba(0,0,0,.18); border-radius:0; }
::-webkit-scrollbar-thumb { background:rgba(10,10,10,.62); border-radius:0; border:none; }
::-webkit-scrollbar-thumb:hover { background:rgba(30,30,30,.80); }
::-webkit-scrollbar-corner { background:transparent; }

body {
  font-family: Tahoma, 'Segoe UI', Geneva, Verdana, sans-serif;
  font-size: 12px;
  background: #000 url('../assets/images/MUSICPLAYERNOTESYMBOL.png') center center / contain fixed no-repeat;
  color: var(--text);
  min-height: 100vh;
  padding: 12px 6px 30px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

a { color: var(--text); text-decoration: none; }
a:hover { color: var(--green); text-decoration: underline; }
p { font-size: 12.5px; line-height: 18px; color: var(--text); margin:0; }

/* ── Page wrap ── */
#pageWrap {
  width: 800px;
  max-width: 100%;
  display: flex;
  flex-direction: column;
}

/* ── Corner logo ── */
#cornerLogo {
  position: fixed;
  top: 10px;
  right: 14px;
  z-index: 9998;
  line-height: 0;
  text-decoration: none;
}
#cornerLogo img {
  height: 36px;
  width: auto;
  object-fit: contain;
  display: block;
  filter: drop-shadow(0 1px 4px rgba(0,0,0,.90));
  opacity: .82;
  transition: opacity .18s, filter .18s;
}
#cornerLogo:hover img {
  opacity: 1;
  filter: drop-shadow(0 0 8px rgba(255,255,255,.55)) drop-shadow(0 1px 4px rgba(0,0,0,.90));
}

/* ── Aero Bar ── */
.aero-bar {
  background: var(--bar-grad);
  border: 1px solid var(--bar-border-s);
  border-top-color: var(--bar-border-t);
  border-bottom-color: var(--bar-border-b);
  box-shadow: inset 0 1px 0 var(--bar-shine), inset 0 2px 4px rgba(255,255,255,.10), 0 3px 10px rgba(0,0,0,.48);
  color: var(--bar-text);
  font-size: 14.6px;
  font-weight: 400;
  padding: 2px 4px;
  text-shadow: var(--bar-tshadow);
  position: relative;
  overflow: hidden;
  display: flex;
  align-items: center;
  gap: 4px;
  margin-bottom: 7px;
}
.aero-bar::before {
  content: '';
  position: absolute; top:0; left:0; right:0; height:50%;
  background: var(--bar-glow-top);
  pointer-events: none;
}
.aero-bar .back-link {
  z-index: 1;
  flex-shrink: 0;
  padding: 2px 3px;
  display: flex;
  align-items: center;
  line-height: 0;
  text-decoration: none;
}
.aero-bar .back-link img {
  height: 30px;
  width: auto;
  object-fit: contain;
  display: block;
  filter: drop-shadow(0 1px 2px rgba(0,0,0,.80));
}
.aero-bar .back-link:hover img {
  filter: drop-shadow(0 0 6px rgba(255,255,255,.70)) brightness(1.2);
}
.aero-bar .bar-title {
  flex: 1;
  text-align: center;
  z-index: 1;
  padding-right: 36px;
}

/* ── Glass Box ── */
.glass-box {
  background-image: linear-gradient(rgb(255 255 255 / 12%), rgb(0 0 0 / 100%));
  box-shadow: inset 0 1px 0 rgba(255,255,255,.07), inset 0 0 10px rgba(200,200,200,.04), 0 5px 6px rgba(0,0,0,.55);
  border: 1px solid var(--glass-border);
  padding: 5px;
  margin-bottom: 7px;
}
.aero-inner {
  border: 1px solid var(--aero-border);
  background: rgba(6,6,6,.92);
}
.aero-pad { padding: 10px 12px; }

/* ── h2 bar ── */
h2 {
  background: var(--bar-grad);
  box-shadow: inset 0 1px 0 var(--bar-shine), 0 3px 10px rgba(0,0,0,.48);
  border: 1px solid var(--bar-border-s);
  border-top-color: var(--bar-border-t);
  border-bottom-color: var(--bar-border-b);
  padding: 5px 8px 7px;
  margin: 0 0 0 0;
  font-weight: 400;
  font-size: 13px;
  color: var(--bar-text);
  text-shadow: var(--bar-tshadow);
  position: relative;
  overflow: hidden;
}
h2::before {
  content: '';
  position: absolute; top:0; left:0; right:0; height:50%;
  background: var(--bar-glow-top);
  pointer-events: none;
}

/* ── Player glass container ── */
#playerGlassBox {
  width: 100%;
}

/* ── Inherit player styles from style.css but patch overrides ── */
#spinningDisk { display: none !important; }

#cdDisc {
  width: 155px; height: 136px;
  display: block; flex-shrink: 0;
  cursor: pointer; border-radius: 50%;
  object-fit: contain; margin-top: 2px;
  filter: drop-shadow(0 0 6px rgba(120,20,20,.5));
  animation-name: _cdSpin;
  animation-duration: 5000ms;
  animation-timing-function: linear;
  animation-iteration-count: infinite;
  animation-play-state: paused;
}
#cdDisc.cd-playing { animation-play-state: running; }
@keyframes _cdSpin {
  from { transform: rotate(0deg); }
  to   { transform: rotate(360deg); }
}

#playlistRight {
  display: flex !important; flex-direction: column !important;
  align-items: center !important; justify-content: flex-start !important;
  padding: 8px 6px !important; gap: 6px !important;
  width: 183px !important; flex-shrink: 0 !important;
  overflow: visible !important;
}

#visualizerCanvas {
  background: rgba(4,4,4,.97) !important;
  border: 1px solid rgba(100,100,100,.35);
  width: 163px !important; display: block; cursor: default;
}

/* Player button hover tint */
.mp-ctrl-btn:hover img,
.mp-ctrl-btn:hover .player-img,
.mp-mute-btn:hover img,
.mp-loop-btn:hover img {
  filter: sepia(100%) saturate(6) hue-rotate(300deg) brightness(1.25) !important;
  -webkit-filter: sepia(100%) saturate(6) hue-rotate(300deg) brightness(1.25) !important;
}

/* Like/dislike icons: no filter */
#mpLikeBtn img,
#mpDislikeBtn img {
  filter: none !important;
  -webkit-filter: none !important;
}

/* Sound toggle */
#soundToggle {
  position: fixed;
  bottom: 8px;
  left: 10px;
  z-index: 9999;
  font-family: Tahoma, sans-serif;
  font-size: 10px;
  color: rgba(140,140,140,.55);
  cursor: pointer;
  user-select: none;
  padding: 2px 0;
  background: none;
  border: none;
  outline: none;
  transition: color .15s;
}
#soundToggle:hover { color: rgba(200,200,200,.80); }
#soundToggle.off   { color: rgba(90,90,90,.50); }

/* ── Mobile ── */
@media (max-width: 600px) {
  body {
    padding: 8px 4px 24px;
    background-attachment: scroll;
  }
  #pageWrap { width: 100%; }
  .aero-bar { font-size: 13px; }
  .aero-bar .back-link img { height: 26px; }
  .aero-bar .bar-title { padding-right: 0; font-size: 12px; }
  #cornerLogo img { height: 28px; }
  .glass-box { padding: 4px; }
}
</style>
</head>
<body>

<!-- Corner logo -->
<a id="cornerLogo" href="../index.html#introduction" title="Watanagashi Archive — Home">
  <img src="../assets/images/watanagashilogo.png" alt="Watanagashi Archive"
    onerror="this.style.display='none'">
</a>

<div id="pageWrap">

  <!-- Top aero nav bar -->
  <div class="aero-bar">
    <a class="back-link" href="../index.html" title="Back to Archive">
      <img src="https://img1.picmix.com/output/stamp/thumb/9/6/4/8/2608469_0fb9f.png" alt="&#8249;"
        onerror="this.outerHTML='<span style=&quot;color:#bbb;font-size:22px;line-height:1;z-index:1;&quot;>&#8249;</span>'">
    </a>
    <span class="bar-title">Music Player &#9834;</span>
  </div>

  <!-- Intro blurb -->
  <div class="glass-box">
    <div class="aero-inner">
      <div class="aero-pad" style="display:flex;align-items:flex-start;gap:10px;">
        <img src="../assets/images/MUSICPLAYERNOTESYMBOL.png" alt="Music"
          style="height:36px;width:auto;object-fit:contain;flex-shrink:0;filter:none;"
          onerror="this.style.display='none'">
        <p>Enjoy listening to some bangers below &mdash; based on personal picks :-)</p>
      </div>
    </div>
  </div>

  <!-- Music Player -->
  <div class="glass-box" id="playerGlassBox">
    <div id="musicPlayerContainer" class="aero-glass-overlay">

      <div class="mp-header-bar">Music Player &#9834;</div>

      <div class="mp-controls-row">
        <button class="mp-ctrl-btn" id="audioBack" title="Previous">
          <img class="player-img" src="https://frutigeraeroarchive.org/images/music_player/music_player_back.png" alt="Back" draggable="false">
        </button>
        <button class="mp-ctrl-btn" id="audioPlayPause" title="Play/Pause">
          <img class="player-img" id="audioPlayPauseImage"
            src="https://frutigeraeroarchive.org/images/music_player/music_player_play.png" alt="Play" draggable="false">
        </button>
        <button class="mp-ctrl-btn" id="audioForward" title="Next">
          <img class="player-img" src="https://frutigeraeroarchive.org/images/music_player/music_player_forward.png" alt="Forward" draggable="false">
        </button>
      </div>

      <!-- Hidden YT container -->
      <div id="ytContainer" style="position:fixed;bottom:0;right:0;width:1px;height:1px;overflow:hidden;opacity:0;pointer-events:none;">
        <div id="_ytEl"></div>
      </div>

      <div id="musicBackground">
        <div id="musicPlayerPlaylist">
          <nav id="playlistLeft"></nav>
          <div class="playlist-right" id="playlistRight">
            <canvas id="visualizerCanvas" width="175" height="96"></canvas>
            <img src="https://frutigeraeroarchive.org/images/music_player/cd.png"
              id="spinningDisk" alt="CD" draggable="false">
          </div>
        </div>
      </div>

      <!-- Status bar -->
      <div class="mp-status-bar" id="mpStatusBar"
        style="position:relative;display:flex;align-items:center;gap:6px;padding:4px 8px;">
        <div style="display:flex;align-items:center;gap:4px;flex-shrink:0;">
          <button id="mpLikeBtn" title="Like"
            style="background:none;border:none;cursor:pointer;padding:2px;display:flex;align-items:center;opacity:0.3;">
            <img src="https://cdn-icons-png.flaticon.com/128/739/739231.png"
              style="width:16px;height:16px;pointer-events:none;filter:grayscale(80%) brightness(0.5);" draggable="false">
          </button>
          <span id="mpLikeVal" style="font-size:11px;color:#ccc;min-width:12px;">0</span>
          <button id="mpDislikeBtn" title="Dislike"
            style="background:none;border:none;cursor:pointer;padding:2px;display:flex;align-items:center;opacity:0.3;">
            <img src="https://cdn-icons-png.flaticon.com/128/880/880613.png"
              style="width:16px;height:16px;pointer-events:none;filter:grayscale(80%) brightness(0.5);" draggable="false">
          </button>
          <span id="mpDislikeVal" style="font-size:11px;color:#ccc;min-width:12px;">0</span>
        </div>
        <span style="flex:1;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:11.5px;">
          Currently playing: <span id="audioName">&mdash;</span>
        </span>
        <span id="mpPlusBtn" title="Options"
          style="cursor:pointer;font-size:15px;font-weight:bold;color:rgba(200,200,200,.55);padding:0 3px;user-select:none;flex-shrink:0;line-height:1;">+</span>
        <div id="mpPlusPopup"
          style="display:none;position:absolute;right:0;bottom:calc(100% + 2px);z-index:500;background:#0a0202;border:1px solid rgba(180,20,20,.5);min-width:200px;font-family:Tahoma,sans-serif;font-size:12px;padding:4px 0;box-shadow:0 -4px 16px rgba(0,0,0,.8);"
          onclick="event.stopPropagation()">
          <div id="mpPopRandom"     style="padding:7px 16px;cursor:pointer;color:#ccc;">Random</div>
          <div id="mpPopShuffle"    style="padding:7px 16px;cursor:pointer;color:#ccc;">Shuffle: OFF</div>
          <div style="border-top:1px solid rgba(255,255,255,.08);margin:3px 0;"></div>
          <div id="mpPopSortToggle" style="padding:7px 16px;cursor:pointer;color:#ccc;display:flex;justify-content:space-between;align-items:center;">
            Sort <span style="opacity:.5;font-size:10px;">&#9654;</span>
          </div>
          <div id="mpSortSubmenu"   style="display:none;background:rgba(8,2,2,.98);padding:3px 0;border-top:1px solid rgba(255,255,255,.08);"></div>
          <div style="border-top:1px solid rgba(255,255,255,.08);margin:3px 0;"></div>
          <a id="mpPopUrl" style="display:block;padding:7px 16px;cursor:pointer;color:#ccc;text-decoration:none;" target="_blank" rel="noopener noreferrer">URL</a>
        </div>
      </div>

      <!-- Progress / volume row -->
      <div class="mp-progress-row">
        <span style="font-size:10px;color:#aaa;white-space:nowrap;">Time Left:</span>
        <span id="timeLeft" class="mp-time-val">0:00</span>
        <div class="mp-progress-track" style="flex:1 1 auto;">
          <div id="progressFill" class="mp-progress-fill"></div>
          <input type="range" id="progressBar" class="mp-range" value="0" max="100" step="0.01">
        </div>
        <button id="muteButton" class="mp-mute-btn" title="Mute">
          <img id="volumeImage"
            src="https://frutigeraeroarchive.org/images/music_player/volume_medium.png" alt="Vol" draggable="false">
        </button>
        <div class="mp-vol-wrap" id="volWrap">
          <div class="mp-vol-fill" id="volFill"></div>
          <input type="range" id="volumeSlider" class="mp-vol-range" min="0" max="100" step="1" value="30">
        </div>
        <span style="font-size:10px;color:#aaa;white-space:nowrap;">Vol: <span id="volumeIndicator">30</span></span>
        <button id="audioLoop" class="mp-loop-btn" title="Loop">
          <img id="audioLoopImage"
            src="https://frutigeraeroarchive.org/images/music_player/music_player_loop_off.png" alt="Loop" draggable="false">
        </button>
      </div>

    </div>
  </div>

</div><!-- /#pageWrap -->

<!-- CD disc (rendered by music.js outside player) -->
<img src="https://frutigeraeroarchive.org/images/music_player/cd.png"
  id="cdDisc" alt="CD" draggable="false"
  style="display:none;">

<button id="soundToggle" onclick="toggleSound()">Sounds: On</button>

<!-- Scripts — same order as index.html, paths adjusted for pages/ subfolder -->
<script src="../scripts/js/music.js"></script>
<script src="../scripts/js/video.js"></script>
<script src="https://www.youtube.com/iframe_api"></script>
<script src="../scripts/js/script.js"></script>

<script>
/* ── Sounds ── */
const SOUND_BASE = '../assets/audio/';
const SOUNDS = {
  start:   SOUND_BASE + 'sitestart.mp3',
  alert:   SOUND_BASE + 'sitealert.mp3',
  dislike: SOUND_BASE + 'sitedislikeclick.mp3',
  like:    SOUND_BASE + 'sitelikeclick.mp3',
  sort:    SOUND_BASE + 'sitesortclick.mp3',
  button:  SOUND_BASE + 'sitebuttonclick.mp3',
  hover:   SOUND_BASE + 'text.mp3',
};
let _soundsOn = true;
const _audioCache = {};
function _getAudio(key) {
  if (!_audioCache[key]) { const a = new Audio(SOUNDS[key]); a.preload='auto'; _audioCache[key]=a; }
  return _audioCache[key];
}
function playSound(key) {
  if (!_soundsOn) return;
  try {
    const clone = _getAudio(key).cloneNode();
    clone.volume = key==='hover' ? 0.30 : 0.52;
    clone.play().catch(()=>{});
  } catch(e) {}
}
function toggleSound() {
  _soundsOn = !_soundsOn;
  const btn = document.getElementById('soundToggle');
  if (btn) { btn.textContent = _soundsOn ? 'Sounds: On' : 'Sounds: Off'; btn.classList.toggle('off', !_soundsOn); }
  if (_soundsOn) playSound('button');
  sessionStorage.setItem('_soundsOn', String(_soundsOn));
}

document.addEventListener('DOMContentLoaded', () => {
  const stored = sessionStorage.getItem('_soundsOn');
  if (stored === 'false') {
    _soundsOn = false;
    const btn = document.getElementById('soundToggle');
    if (btn) { btn.textContent = 'Sounds: Off'; btn.classList.add('off'); }
  }
  if (!sessionStorage.getItem('_siteStartPlayed')) {
    sessionStorage.setItem('_siteStartPlayed','1');
    setTimeout(()=>playSound('start'), 700);
  }
});

document.addEventListener('pointerdown', ()=>Object.keys(SOUNDS).forEach(k=>_getAudio(k)), {once:true,passive:true});

let _hoverThrottle = 0, _hoverTimer = null;
function _isInteractive(el) {
  if (!el||el===document.body||el===document.documentElement) return false;
  const tag = el.tagName;
  if (tag==='BUTTON'||tag==='A'||tag==='SELECT') return true;
  if (tag==='INPUT'&&el.type!=='range') return true;
  const cs = window.getComputedStyle(el);
  if (cs&&cs.cursor==='pointer') return true;
  return false;
}
document.addEventListener('mouseover', e=>{
  if (e.target.id==='soundToggle') return;
  if (!_isInteractive(e.target)) return;
  clearTimeout(_hoverTimer);
  _hoverTimer = setTimeout(()=>{
    const now = Date.now();
    if (now-_hoverThrottle<400) return;
    _hoverThrottle = now;
    playSound('hover');
  }, 400);
},{passive:true});
document.addEventListener('mouseout', e=>{
  if (_isInteractive(e.target)) clearTimeout(_hoverTimer);
},{passive:true});
document.addEventListener('click', e=>{
  if (e.target.id==='soundToggle') return;
  if (_isInteractive(e.target)) playSound('button');
},true);

/* ── Encoding fix for playlist text ── */
(function() {
  var ELLIPSIS_BAD = '\u00e2\u20ac\u00a6';
  function _fixText(el) {
    if (!el) return;
    if (el.textContent && el.textContent.indexOf(ELLIPSIS_BAD) !== -1)
      el.textContent = el.textContent.split(ELLIPSIS_BAD).join('\u2026');
  }
  var playlist = document.getElementById('playlistLeft');
  if (playlist) {
    new MutationObserver(function(muts) {
      muts.forEach(function(m) {
        m.addedNodes.forEach(function(node) {
          if (node.nodeType === 3) _fixText(node.parentElement);
          else if (node.querySelectorAll) {
            node.querySelectorAll('p,span,div').forEach(_fixText);
            _fixText(node);
          }
        });
      });
    }).observe(playlist, { childList:true, subtree:true });
  }
})();
</script>

</body>
