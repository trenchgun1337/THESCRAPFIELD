<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music Player — Watanagashi Archive</title>
<link rel="icon" type="image/x-icon" href="../assets/images/favicon.ico">
<link rel="stylesheet" href="../scripts/css/style.css">

<script>
  if (window.location.hash !== '#music')
    history.replaceState(null, '', window.location.pathname + '#music');
</script>

<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
* { -webkit-tap-highlight-color:transparent; }
::selection { background:rgba(80,80,80,.45); color:#fff; }
::-moz-selection { background:rgba(80,80,80,.45); color:#fff; }
*:focus { outline:none !important; }
button:active, button:focus, button:focus-visible { outline:none !important; box-shadow:none !important; }

:root {
  --accent:    #cc1a1a;
  --text:      #111;
  --text-dim:  #2c2c2c;
  --grad-bar:  linear-gradient(to bottom,#efefef 0%,#d8d8d8 52%,#c4c4c4 52%,#d0d0d0 100%);
  --shadow-bar: 0 2px 5px rgba(0,0,0,.15);
}

html { scrollbar-width:thin; scrollbar-color:rgba(120,120,120,.50) transparent; }
::-webkit-scrollbar { width:6px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:rgba(120,120,120,.50); border-radius:3px; }
::-webkit-scrollbar-thumb:hover { background:rgba(54,54,54,.8); }

body {
  font-family:'Sawarabi Gothic','Sazanami Gothic',Tahoma,'Segoe UI',sans-serif;
  font-size:12px;
  background:#000 center/contain fixed no-repeat;
  color:var(--text);
  min-height:100vh;
  padding:12px 6px 40px;
  display:flex; flex-direction:column; align-items:center;
}

img { -webkit-user-drag:none; user-select:none; }
a             { color:#000; text-decoration:none; }
a:hover       { color:var(--accent); text-decoration:underline; }
p             { font-size:12.5px; line-height:18px; color:var(--text); margin:0; }

.page        { display:none; }
.page.active { display:block; }

#_pageShell { width:800px; max-width:100%; display:flex; flex-direction:column; }

/* ── Corner logo ── */
#cornerLogo {
  position:fixed; top:10px; right:14px; z-index:9998;
  line-height:0; text-decoration:none;
}
#cornerLogo img { height:36px; width:auto; object-fit:contain; display:block; opacity:.82; pointer-events:auto; }
#cornerLogo:hover img { opacity:1; }

/* ── Topbar ── */
.aero-bar {
  background:var(--grad-bar);
  border:2px ridge #727272;
  box-shadow:var(--shadow-bar);
  color:var(--text); font-size:13px; font-weight:400;
  padding:4px 8px;
  display:flex; align-items:center; gap:6px;
  margin-bottom:7px;
}
.aero-bar .back-link {
  flex-shrink:0; padding:2px 3px;
  display:flex; align-items:center; line-height:0; text-decoration:none;
}
.aero-bar .back-link img { height:28px; width:auto; object-fit:contain; display:block; pointer-events:auto !important; }
.aero-bar .back-link:hover img { filter:brightness(.85); }
.aero-bar .bar-title { flex:1; text-align:center; font-size:12px; letter-spacing:.5px; }

/* ── Glass / aero boxes ── */
.glass-box {
  background:#ebebeb;
  box-shadow:var(--shadow-bar);
  border:2px ridge #727272;
  padding:5px; margin-bottom:7px;
}
.aero-inner { border:1px solid rgba(0,0,0,.30); background:#f2f2f2; }
.aero-pad   { padding:10px 12px; }

/* ── Override style.css player elements to use light theme ── */

/* Header bar */
#musicPlayerContainer .mp-header-bar {
  background:var(--grad-bar) !important;
  border-bottom:1px solid rgba(0,0,0,.18) !important;
  border-top:1px solid rgba(255,255,255,.70) !important;
  box-shadow:none !important;
  color:var(--text) !important;
  font-size:14px !important;
}

/* Controls row */
#musicPlayerContainer .mp-controls-row {
  background:var(--grad-bar) !important;
  border-top:1px solid rgba(255,255,255,.70) !important;
  border-bottom:1px solid rgba(0,0,0,.15) !important;
  box-shadow:none !important;
}

/* Playlist background */
#musicBackground {
  background:#f0f0f0 !important;
  background-image:repeating-linear-gradient(0deg,rgba(0,0,0,.03) 0px,rgba(0,0,0,.03) 1px,transparent 1px,transparent 3px) !important;
}

/* Playlist left scrollbar */
#playlistLeft {
  scrollbar-color:rgba(120,120,120,.50) transparent !important;
}

/* Group headers */
.pl-group-header {
  background:linear-gradient(to bottom,#e0e0e0,#d0d0d0) !important;
  color:var(--accent) !important;
  border-bottom:1px solid rgba(0,0,0,.15) !important;
  border-top:1px solid rgba(255,255,255,.60) !important;
}

/* Track list */
.pl-track-list li { color:var(--text) !important; }
.pl-track-list li a { color:var(--text) !important; }
.pl-track-list li a:hover { color:var(--accent) !important; }
.pl-track-list li a.activeSong { color:var(--accent) !important; }

/* Visualizer */
#visualizerCanvas {
  background:#e8e8e8 !important;
  border:1px solid rgba(0,0,0,.20) !important;
}

/* Status bar */
#musicPlayerContainer .mp-status-bar {
  background:var(--grad-bar) !important;
  border-top:1px solid rgba(255,255,255,.60) !important;
  border-bottom:1px solid rgba(0,0,0,.15) !important;
  color:var(--text) !important;
}
#audioName { color:var(--accent) !important; }
#mpLikeVal, #mpDislikeVal { color:#444 !important; }
#mpPlusBtn { color:rgba(0,0,0,.45) !important; }

/* Plus popup */
#mpPlusPopup {
  background:#fff !important;
  border:1px solid rgba(140,140,140,.50) !important;
  box-shadow:0 4px 12px rgba(0,0,0,.15) !important;
}
#mpPopRandom, #mpPopShuffle, #mpPopSortToggle,
#mpSortSubmenu div, #mpPopUrl { color:var(--text) !important; }
#mpPopRandom:hover, #mpPopShuffle:hover, #mpPopSortToggle:hover,
#mpSortSubmenu div:hover, #mpPopUrl:hover {
  background:#ebebeb !important; color:var(--accent) !important;
}
#mpSortSubmenu { background:#f5f5f5 !important; border-top:1px solid rgba(0,0,0,.10) !important; }

/* Progress row */
#musicPlayerContainer .mp-progress-row {
  background:var(--grad-bar) !important;
  border-bottom:1px solid rgba(0,0,0,.15) !important;
  border-top:1px solid rgba(255,255,255,.60) !important;
  box-shadow:none !important;
}
#musicPlayerContainer .mp-progress-row span { color:var(--text-dim) !important; }
#timeLeft { color:var(--accent) !important; }
#volumeIndicator { color:var(--accent) !important; }

/* Progress track */
.mp-progress-track, .mp-vol-wrap {
  background:linear-gradient(to bottom,#ccc,#e0e0e0) !important;
  border:1px solid rgba(0,0,0,.20) !important;
  box-shadow:inset 0 1px 2px rgba(0,0,0,.10) !important;
}
.mp-progress-fill, .mp-vol-fill {
  background:linear-gradient(to bottom,#555 0%,#333 45%,#1a1a1a 50%,#444 100%) !important;
}

/* Player images — keep default colors, no red tint */
.mp-ctrl-btn img, .mp-ctrl-btn .player-img,
.mp-mute-btn img, .mp-loop-btn img {
  filter:none !important; -webkit-filter:none !important;
}
.mp-ctrl-btn:hover img, .mp-ctrl-btn:hover .player-img,
.mp-mute-btn:hover img, .mp-loop-btn:hover img {
  filter:brightness(.75) !important; -webkit-filter:brightness(.75) !important;
}
#mpLikeBtn img, #mpDislikeBtn img {
  filter:none !important; -webkit-filter:none !important;
}

/* Playlist right panel */
#playlistRight {
  display:flex !important; flex-direction:column !important;
  align-items:center !important; justify-content:flex-start !important;
  padding:8px 6px !important; gap:6px !important;
  width:183px !important; flex-shrink:0 !important; overflow:visible !important;
}

/* CD */
#spinningDisk { display:none !important; }
#cdDisc {
  width:155px; height:136px; display:block; flex-shrink:0;
  cursor:pointer; border-radius:50%; object-fit:contain; margin-top:2px;
  filter:drop-shadow(0 2px 6px rgba(0,0,0,.25));
  animation-name:_cdSpin; animation-duration:5000ms;
  animation-timing-function:linear; animation-iteration-count:infinite;
  animation-play-state:paused;
}
#cdDisc.cd-playing { animation-play-state:running; }
@keyframes _cdSpin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }

/* Hide Rena/Rika */
#renaChan, #rikaChan { display:none !important; }

/* ── Sound toggle ── */
#soundToggle {
  position:fixed; bottom:8px; left:10px; z-index:9999;
  font-family:'Sawarabi Gothic',Tahoma,sans-serif;
  font-size:10px; color:rgba(0,0,0,.40); cursor:pointer;
  user-select:none; padding:2px 0; background:none; border:none; outline:none;
}
#soundToggle:hover { color:rgba(0,0,0,.70); }
#soundToggle.off   { color:rgba(0,0,0,.22); }

/* ── Mobile ── */
@media (max-width:600px) {
  body { padding:8px 4px 24px; background-attachment:scroll; }
  #_pageShell { width:100%; }
  .aero-bar { font-size:12px; }
  .aero-bar .back-link img { height:24px; }
  #cornerLogo img { height:28px; }
  .glass-box { padding:4px; }
}
</style>
</head>
<body>

<a id="cornerLogo" href="../index.html#introduction" title="Watanagashi Archive — Home">
  <img src="../assets/images/watanagashilogo.png" alt="Watanagashi Archive"
    onerror="this.style.display='none'">
</a>

<!-- Hidden stubs for script.js -->
<div style="display:none !important;position:absolute;width:0;height:0;overflow:hidden;pointer-events:none;">
  <aside id="sidebarAside">
    <div id="navigationMenu">
      <a class="nav-link" id="nbtn-introduction" href="#introduction"></a>

<div id="_pageShell">

  <div class="aero-bar">
    <a class="back-link" href="../index.html" title="Back to Archive">
      <img src="https://img1.picmix.com/output/stamp/thumb/9/6/4/8/2608469_0fb9f.png" alt="&#8249;"
        onerror="this.outerHTML='<span style=&quot;color:#333;font-size:22px;line-height:1;&quot;>&#8249;</span>'">
    </a>
    <span class="bar-title">MUSIC PLAYER ♪</span>

  <div class="glass-box">
    <div class="aero-inner">
      <div class="aero-pad" style="display:flex;align-items:flex-start;gap:10px;">
        <img src="../assets/images/MUSICPLAYERNOTESYMBOL.png" alt="Music"
          style="height:36px;width:auto;object-fit:contain;flex-shrink:0;filter:none;"

  <div id="pg-music" class="page active" style="display:block !important;">
    <div class="glass-box" id="playerGlassBox">
      <div id="musicPlayerContainer" class="aero-glass-overlay">

        <div class="mp-header-bar">Music Player &#9834;</div>

        <div class="mp-controls-row">
          <button class="mp-ctrl-btn" id="audioBack" title="Previous">
            <img class="player-img" src="https://frutigeraeroarchive.org/images/music_player/music_player_back.png" alt="Back" draggable="false">
          </button>
          <button class="mp-ctrl-btn" id="audioPlayPause" title="Play/Pause">

          </button>
          <button class="mp-ctrl-btn" id="audioForward" title="Next">

          </button>
        </div>

        <div id="ytContainer" style="position:fixed;bottom:0;right:0;width:1px;height:1px;overflow:hidden;opacity:0;pointer-events:none;">
          <div id="_ytEl"></div>
        </div>

        <div id="musicBackground">
          <div id="musicPlayerPlaylist">
            <nav id="playlistLeft"></nav>
            <div class="playlist-right" id="playlistRight">

<script>
var _BG_URL = 'https://preview.redd.it/is-there-any-kind-of-higurashi-audio-only-thing-that-i-can-v0-rlmimbxfqz0e1.jpeg?width=1080&crop=smart&auto=webp&s=a4b337ee1258844d21720824a2a0b17b640c122a';

function _applyMusicBg() {
  var s = document.getElementById('_musicPageBg');
  if (!s) { s = document.createElement('style'); s.id = '_musicPageBg'; document.head.appendChild(s); }
  s.textContent = 'body{background-image:url("'+_BG_URL+'")!important;background-size:contain!important;background-attachment:fixed!important;background-repeat:no-repeat!important;background-position:center center!important;background-color:#000!important;}';
  document.head.appendChild(s);
}
_applyMusicBg();

new MutationObserver(function(muts) {
  muts.forEach(function(m) {
    m.addedNodes.forEach(function(node) {
      if (node.id === '_darkThemeBgStyle' || node.id === '_themeStyle') setTimeout(_applyMusicBg, 30);
    });
  });
}).observe(document.head, { childList:true });

var _origGoto = window.gotoPage;
window.gotoPage = function(name) {
  if (_origGoto) _origGoto(name);
  var pg = document.getElementById('pg-music');
  if (pg) { pg.style.display = 'block'; pg.classList.add('active'); }
};

/* ── Sounds ── */
var _SB = '../assets/audio/';
var _SND = { start:_SB+'sitestart.mp3', alert:_SB+'sitealert.mp3', dislike:_SB+'sitedislikeclick.mp3', like:_SB+'sitelikeclick.mp3', sort:_SB+'sitesortclick.mp3', button:_SB+'sitebuttonclick.mp3', hover:_SB+'text.mp3' };
var _soundsOn = true, _aCache = {}, _hoverThrottle = 0, _hoverTimer = null;

function _getAudio(k) { if (!_aCache[k]) { var a=new Audio(_SND[k]); a.preload='auto'; _aCache[k]=a; } return _aCache[k]; }
function playSound(k) { if (!_soundsOn) return; try { var c=_getAudio(k).cloneNode(); c.volume=(k==='hover'?.30:.52); c.play().catch(function(){}); } catch(e){} }
function toggleSound() {
  _soundsOn = !_soundsOn;
  var btn = document.getElementById('soundToggle');
  if (btn) { btn.textContent=_soundsOn?'Sounds: On':'Sounds: Off'; btn.classList.toggle('off',!_soundsOn); }
  if (_soundsOn) playSound('button');
  sessionStorage.setItem('_soundsOn', String(_soundsOn));
}

document.addEventListener('DOMContentLoaded', function() {
  if (sessionStorage.getItem('_soundsOn') === 'false') {
    _soundsOn = false;
    var btn = document.getElementById('soundToggle');
    if (btn) { btn.textContent='Sounds: Off'; btn.classList.add('off'); }
  }
  if (!sessionStorage.getItem('_siteStartPlayed')) {
    sessionStorage.setItem('_siteStartPlayed','1');
    setTimeout(function(){ playSound('start'); }, 700);
  }
});

document.addEventListener('pointerdown', function(){ Object.keys(_SND).forEach(function(k){ _getAudio(k); }); },{once:true,passive:true});

function _isInteractive(el) {
  if (!el||el===document.body||el===document.documentElement) return false;
  var t=el.tagName;
  if(t==='BUTTON'||t==='A'||t==='SELECT') return true;
  if(t==='INPUT'&&el.type!=='range') return true;
  var cs=window.getComputedStyle(el); return cs&&cs.cursor==='pointer';
}
document.addEventListener('mouseover',function(e){ if(e.target.id==='soundToggle') return; if(!_isInteractive(e.target)) return; clearTimeout(_hoverTimer); _hoverTimer=setTimeout(function(){ var n=Date.now(); if(n-_hoverThrottle<400) return; _hoverThrottle=n; playSound('hover'); },400); },{passive:true});
document.addEventListener('mouseout',function(e){ if(_isInteractive(e.target)) clearTimeout(_hoverTimer); },{passive:true});
document.addEventListener('click',function(e){ if(e.target.id==='soundToggle') return; if(_isInteractive(e.target)) playSound('button'); },true);

(function(){
  var BAD='\u00e2\u20ac\u00a6';
  function fix(el){if(!el)return;if(el.textContent&&el.textContent.indexOf(BAD)!==-1)el.textContent=el.textContent.split(BAD).join('\u2026');}
  var pl=document.getElementById('playlistLeft');
  if(pl) new MutationObserver(function(ms){ms.forEach(function(m){m.addedNodes.forEach(function(n){ if(n.nodeType===3)fix(n.parentElement); else if(n.querySelectorAll){n.querySelectorAll('p,span,div').forEach(fix);fix(n);} });});}).observe(pl,{childList:true,subtree:true});
})();
</script>
</body>
