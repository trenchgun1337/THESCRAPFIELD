<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>Sketchbook — Watanagashi Archive</title>
<link rel="icon" type="image/x-icon" href="../assets/images/rikaico.ico">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
*{-webkit-tap-highlight-color:transparent}
::selection{background:rgba(80,80,80,.45);color:#fff}
*:focus{outline:none!important}
button:active,button:focus,button:focus-visible{outline:none!important;box-shadow:none!important}

:root{
  --accent:#4a7fa5;
  --text:#111;
  --text-dim:#2c2c2c;
  --grad-bar:linear-gradient(to bottom,#efefef 0%,#d8d8d8 52%,#c4c4c4 52%,#d0d0d0 100%);
  --grad-dark:linear-gradient(to bottom,#555 0%,#333 50%,#222 50%,#2e2e2e 100%);
  --shadow-bar:0 2px 5px rgba(0,0,0,.15);
  --star-on:#f0a500;
  --star-off:#ccc;
}

html{scrollbar-width:thin;scrollbar-color:rgba(120,120,120,.50) transparent}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(120,120,120,.50);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:rgba(54,54,54,.8)}

body{
  font-family:'Sawarabi Gothic','Sazanami Gothic',Tahoma,'Segoe UI',sans-serif;
  font-size:12px;
  background:#000 center/78% fixed no-repeat;
  background-image:url('../assets/images/sketchbook.jpg');
  color:var(--text);
  padding:12px 6px 60px;
  display:flex;flex-direction:column;align-items:center;
  min-height:100vh;
}

img{-webkit-user-drag:none;user-select:none}
a{color:#000;text-decoration:none}
a:hover{color:var(--accent);text-decoration:underline}
p{font-size:12.5px;line-height:18px;color:var(--text);margin:0}

#_pageShell{width:800px;max-width:100%;display:flex;flex-direction:column;gap:7px}

#cornerLogo{position:fixed;top:10px;right:14px;z-index:9998;line-height:0;text-decoration:none}
#cornerLogo img{height:36px;width:auto;object-fit:contain;display:block;opacity:.82}
#cornerLogo:hover img{opacity:1}

/* ── AERO BARS ── */
.aero-bar{
  background:var(--grad-bar);border:2px ridge #727272;
  box-shadow:var(--shadow-bar);color:var(--text);font-size:13px;
  padding:4px 8px;display:flex;align-items:center;gap:6px;
}
.aero-bar .back-link{flex-shrink:0;padding:2px 3px;display:flex;align-items:center;line-height:0;text-decoration:none}
.aero-bar .back-link img{height:28px;width:auto;object-fit:contain;display:block}
.aero-bar .back-link:hover img{filter:brightness(.85)}
.aero-bar .bar-title{flex:1;text-align:center;font-size:12px;letter-spacing:.5px}

.glass-box{background:#ebebeb;box-shadow:var(--shadow-bar);border:2px ridge #727272;padding:5px}
.aero-inner{border:1px solid rgba(0,0,0,.30);background:#f2f2f2}
.aero-pad{padding:10px 12px}

.section-bar{
  display:flex;background:#000;padding:5px 8px;margin:0;line-height:1.6;
  font-size:11px;font-weight:400;letter-spacing:1.5px;text-transform:uppercase;color:#fff;
  align-items:center;justify-content:space-between;
}

/* ── MAIN TABS ── */
.main-tab-bar{
  display:flex;background:var(--grad-bar);border:2px ridge #727272;
  box-shadow:var(--shadow-bar);gap:0;
}
.main-tab{
  flex:1;padding:7px 10px;font-size:11.5px;font-family:inherit;letter-spacing:.8px;
  text-transform:uppercase;border:none;cursor:pointer;background:transparent;
  color:#666;border-right:1px solid rgba(140,140,140,.40);
}
.main-tab:last-child{border-right:none}
.main-tab:hover{background:rgba(0,0,0,.06);color:#222}
.main-tab.active{
  background:linear-gradient(to bottom,rgba(255,255,255,.18) 0%,rgba(60,80,120,.40) 18%,rgba(30,50,90,.82) 60%,rgba(10,25,55,.95) 60%,rgba(20,40,75,.80) 100%);
  border-bottom:2px solid var(--accent);color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.7);
}
.main-panel{display:none}
.main-panel.active{display:block}

/* ── BUTTONS ── */
.admin-btn{
  background:var(--grad-dark);
  border:1px solid rgba(0,0,0,.55);color:#eee;font-family:inherit;
  font-size:10.5px;padding:3px 9px;cursor:pointer;letter-spacing:.3px;white-space:nowrap;
}
.admin-btn:hover{filter:brightness(1.3)}

/* ── CONTROLS ROW ── */
.controls-row{
  background:var(--grad-bar);border:1px solid rgba(140,140,140,.40);
  padding:5px 8px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;
  box-shadow:var(--shadow-bar);
}
.ctrl-label{font-size:10px;color:#666;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
.ctrl-input{
  background:#fff;border:1px solid rgba(140,140,140,.55);
  font-family:inherit;font-size:11px;color:#111;padding:3px 7px;
}
.ctrl-input::placeholder{color:#aaa}
.ctrl-btn{
  background:var(--grad-dark);
  border:1px solid rgba(0,0,0,.55);color:#eee;font-family:inherit;
  font-size:10.5px;padding:3px 9px;cursor:pointer;white-space:nowrap;letter-spacing:.3px;
}
.ctrl-btn:hover{filter:brightness(1.25)}
.ctrl-btn.active{
  background:linear-gradient(to bottom,#333,#111 50%,#000 50%,#1a1a1a 100%);
  border-color:rgba(255,255,255,.18);color:#fff;
}
.ctrl-spacer{flex:1}

/* ── GALLERY GRID ── */
.gi-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
  gap:6px;padding:6px;background:#e8e8e8;
  border:1px solid rgba(0,0,0,.20);min-height:160px;
}

.gi-card{
  position:relative;background:#fff;
  border:1px solid rgba(0,0,0,.20);
  box-shadow:0 1px 3px rgba(0,0,0,.12);
  overflow:hidden;
  display:flex;flex-direction:column;
}
.gi-card:hover{box-shadow:0 3px 10px rgba(0,0,0,.25);transform:translateY(-1px);border-color:rgba(100,100,100,.45)}

.gi-card-imgwrap{
  width:100%;aspect-ratio:1/1;overflow:hidden;
  background:#d8d8d8;border-bottom:1px solid rgba(0,0,0,.12);
  cursor:zoom-in;flex-shrink:0;position:relative;
}
.gi-card-imgwrap img{
  width:100%;height:100%;object-fit:cover;display:block;
  pointer-events:none;transition:filter .2s;
}
.gi-card:hover .gi-card-imgwrap img{filter:brightness(1.04) contrast(1.02)}

/* hover overlay */
.gi-card-overlay{
  position:absolute;inset:0;background:rgba(0,0,0,.55);
  display:flex;align-items:center;justify-content:center;
  opacity:0;transition:opacity .15s;pointer-events:none;
}
.gi-card-imgwrap:hover .gi-card-overlay{opacity:1}
.gi-card-overlay span{color:#fff;font-size:11px;letter-spacing:1px;text-transform:uppercase}

.gi-card-body{padding:5px 7px 7px;flex:1;display:flex;flex-direction:column;gap:2px}
.gi-card-title{font-size:11.5px;color:#111;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:400;letter-spacing:.2px}
.gi-card-desc{font-size:10px;color:#777;line-height:1.5;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.gi-rating-label{font-size:9px;color:#999;letter-spacing:.8px;text-transform:uppercase;margin-top:3px}

/* ── STARS ── */
.gi-stars-row{display:flex;align-items:center;gap:1px;flex-wrap:nowrap;padding:2px 0}
.gi-star{display:inline-block;cursor:default;user-select:none;-webkit-user-select:none;line-height:1;flex-shrink:0}
.gi-star img{display:block;width:14px;height:14px;pointer-events:none}
.gi-star-interactive{cursor:pointer!important}
.gi-star-interactive img{pointer-events:auto!important}
.gi-avg{font-size:10px;color:#888;margin-left:4px}
.gi-cnt{font-size:9px;color:#aaa;margin-left:2px}

/* ── AWARDED SECTION ── */
#galleryAwarded{margin-bottom:2px}
.gi-awarded-layout{display:flex;flex-direction:column;align-items:center;gap:6px;padding:10px}
.gi-awarded-title-top{font-size:14px;letter-spacing:1px;text-transform:uppercase;color:#fff;text-align:center}
.gi-awarded-imgbox{position:relative;cursor:zoom-in}
.gi-awarded-img{max-height:260px;max-width:100%;border:2px ridge #888;box-shadow:0 4px 18px rgba(0,0,0,.5);display:block}
.gi-awarded-desc{font-size:11px;color:#fff;text-align:center;max-width:400px}
.gi-awarded-stars-wrap{display:flex;justify-content:center}
.gi-awarded-empty{padding:20px;text-align:center;color:#aaa;font-size:11px}
.gi-awarded-stars-wrap .gi-star img{width:26px;height:26px}

/* section-header-row for sort button */
.section-header-row{display:flex;align-items:center;justify-content:space-between;position:relative}

.gi-empty{
  grid-column:1/-1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:8px;
  padding:40px 20px;color:#aaa;font-size:12px;text-align:center;min-height:120px;
}

/* ── LIGHTBOX (gallery.js style) ── */
.gi-lb-overlay{
  display:none;position:fixed;inset:0;z-index:10000;
  background:rgba(0,0,0,.88);align-items:center;justify-content:center;
}
.gi-lb-overlay.gi-lb-active{display:flex}
.gi-lb-box{
  background:#181818;border:2px ridge #555;
  width:min(92vw,820px);max-height:92vh;
  display:flex;flex-direction:column;overflow:hidden;
  box-shadow:0 8px 40px rgba(0,0,0,.85);
}
.gi-lb-titlebar{
  background:var(--grad-dark);border-bottom:1px solid rgba(255,255,255,.12);
  padding:5px 10px;display:flex;align-items:center;justify-content:space-between;
  font-size:11.5px;color:#ddd;letter-spacing:.3px;flex-shrink:0;
}
.gi-lb-title-btns{display:flex;gap:4px}
.gi-lb-close{
  background:rgba(60,0,0,.7);border:1px solid rgba(200,50,50,.4);
  color:#ff9999;font-family:inherit;font-size:10px;padding:2px 8px;cursor:pointer;letter-spacing:.3px;
}
.gi-lb-close:hover{background:rgba(120,0,0,.8);color:#fff}
.gi-lb-imgarea{
  flex:1;display:flex;align-items:stretch;overflow:hidden;min-height:0;position:relative;
}
.gi-lb-imgwrap{
  flex:1;overflow:hidden;display:flex;align-items:center;justify-content:center;
  background:#111;cursor:zoom-in;position:relative;
}
#giLbImg{
  max-width:100%;max-height:100%;object-fit:contain;
  display:block;user-select:none;-webkit-user-drag:none;
}
.gi-lb-arrow{
  background:rgba(0,0,0,.55);border:none;border-left:1px solid rgba(255,255,255,.1);
  color:#ccc;font-size:20px;padding:0 10px;cursor:pointer;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
}
.gi-lb-arrow:first-child{border-left:none;border-right:1px solid rgba(255,255,255,.1)}
.gi-lb-arrow:hover{background:rgba(60,80,110,.7);color:#fff}
.gi-lb-bottom{
  background:#0f0f0f;border-top:1px solid rgba(255,255,255,.08);
  padding:8px 12px;display:flex;gap:12px;align-items:flex-start;flex-wrap:wrap;flex-shrink:0;
}
.gi-lb-desc{font-size:11px;color:#aaa;flex:1;line-height:1.6}
.gi-lb-meta{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
#giLbCounter{font-size:10px;color:#666}
#giLbStars{display:flex;justify-content:flex-end}

/* ── PAINT ── */
#paintEmbedWrap{width:100%;height:500px;background:#e0e0e0;border:1px solid rgba(0,0,0,.20);overflow:hidden;}
#paintEmbedWrap iframe{width:100%;height:100%;border:none;display:block;}

/* ── SOUND ── */
#soundToggle{
  position:fixed;bottom:8px;left:10px;z-index:9999;
  font-family:inherit;font-size:10px;color:rgba(255,255,255,.5);
  cursor:pointer;padding:2px 0;background:none;border:none;
}
#soundToggle:hover{color:rgba(255,255,255,.85)}
#soundToggle.off{color:rgba(255,255,255,.22)}

/* ── SORT PANEL ── */
#gallerySortPanel{
  display:none;position:absolute;background:#000;border:1px solid rgba(180,20,20,.3);
  padding:4px 0;z-index:200;min-width:160px;font-family:Tahoma,sans-serif;
  font-size:11px;right:0;top:100%;
}
#gallerySortBtn{
  background:var(--grad-dark);border:1px solid rgba(0,0,0,.55);color:#eee;
  font-family:inherit;font-size:10px;padding:3px 9px;cursor:pointer;letter-spacing:.3px;
}
#gallerySortBtn:hover{filter:brightness(1.3)}

/* gi-link style for card descriptions */
.gi-link{color:var(--accent);text-decoration:underline}
.gi-link:hover{color:#7db8d8}

/* ── MOBILE ── */
@media(max-width:620px){
  body{padding:6px 3px 48px}
  #_pageShell{width:100%}
  .gi-grid{grid-template-columns:repeat(2,1fr);gap:4px;padding:4px}
}
@media(max-width:400px){
  .gi-grid{grid-template-columns:1fr}
  .main-tab{font-size:10px;padding:6px 5px;letter-spacing:.4px}
}
</style>
</head>
<body>

<a id="cornerLogo" href="../index.html#introduction" title="Watanagashi Archive — Home">
  <img src="../assets/images/watanagashilogo2.png" alt="Watanagashi Archive" onerror="this.style.display='none'">
</a>

<div id="_pageShell">

  <!-- Top bar -->
  <div class="aero-bar">
    <a class="back-link" href="../index.html#resources" title="Back">
      <img src="https://img1.picmix.com/output/stamp/thumb/9/6/4/8/2608469_0fb9f.png" alt="&#x2039;"
        onerror="this.outerHTML='<span style=&quot;color:#333;font-size:22px;line-height:1;&quot;>&#x2039;</span>'">
    </a>
    <span class="bar-title">SKETCHBOOK &amp; GALLERY</span>
  </div>

  <!-- Main tabs -->
  <div class="main-tab-bar">
    <button class="main-tab active" onclick="switchMainTab('gallery')">&#x1F5BC; Gallery</button>
    <button class="main-tab" onclick="switchMainTab('paint')">&#x1F58C; Paint</button>
  </div>

  <!-- ═══════ GALLERY PANEL ═══════ -->
  <div id="panel-gallery" class="main-panel active">

    <!-- Awarded / Best rated -->
    <div class="glass-box" style="background:#1a1a1a;border-color:#444">
      <div class="section-bar" style="background:#111;border-bottom:1px solid #333">
        &#x2605; Best Rated
      </div>
      <div id="galleryAwarded"></div>
    </div>

    <!-- Gallery -->
    <div class="glass-box">
      <div class="section-bar section-header-row">
        <span>Gallery</span>
        <div style="display:flex;align-items:center;gap:6px;position:relative">
          <span id="galleryCount" style="font-size:10px;letter-spacing:.5px;font-weight:400;opacity:.7">0 pieces</span>
          <button id="gallerySortBtn">Sort &#x25BE;</button>
          <div id="gallerySortPanel"></div>
        </div>
      </div>
      <div class="aero-inner">
        <!-- Search -->
        <div class="controls-row">
          <span class="ctrl-label">Search:</span>
          <input type="text" class="ctrl-input" id="searchInput" placeholder="Search…" style="width:130px" oninput="GallerySystem.renderGrid()">
          <div class="ctrl-spacer"></div>
          <span id="ratingStatus" style="font-size:9.5px;color:#888;font-style:italic"></span>
        </div>
        <div class="gi-grid" id="galleryGrid">
          <div class="gi-empty">Loading…</div>
        </div>
      </div>
    </div>
  </div>

  <!-- ═══════ PAINT PANEL ═══════ -->
  <div id="panel-paint" class="main-panel">
    <div class="glass-box">
      <div class="section-bar">
        JS Paint
        <a href="https://jspaint.app" target="_blank" rel="noopener noreferrer"
           style="font-size:9.5px;color:#aaa;letter-spacing:.5px;text-transform:uppercase;text-decoration:none;"
           onmouseover="this.style.color='#fff'" onmouseout="this.style.color='#aaa'">
          Open in new tab &#x2197;
        </a>
      </div>
      <div class="aero-inner" style="padding:5px">
        <div id="paintEmbedWrap"></div>
      </div>
    </div>
  </div>

</div>

<!-- Lightbox (built by GallerySystem) -->

<button id="soundToggle">Sounds: On</button>

<!-- gallery.js (static items + GallerySystem) -->
<script src="scripts/js/gallery.js"></script>

<!-- Firebase for ratings only -->
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js';
import { getDatabase, ref, set, remove, onValue }
  from 'https://www.gstatic.com/firebasejs/12.9.0/firebase-database.js';

/* ── These are already in gallery.js but we need a live instance for UI updates ── */
/* FirebaseManager (from gallery.js) handles all rating persistence.
   This module just wires up the status indicator and kicks off GallerySystem. */

document.addEventListener('DOMContentLoaded', () => {
  const status = document.getElementById('ratingStatus');
  if (status) {
    setTimeout(() => {
      status.textContent = window.GallerySystem?._useFirebase
        ? 'Ratings: live ✓'
        : 'Ratings: local';
    }, 2500);
  }
});
</script>

<!-- Tab switch + Paint + Sounds -->
<script>
window.switchMainTab = function(tab) {
  document.querySelectorAll('.main-tab').forEach((b, i) =>
    b.classList.toggle('active', ['gallery','paint'][i] === tab));
  document.querySelectorAll('.main-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + tab).classList.add('active');
  if (tab === 'paint') initPaint();
};

var paintInited = false;
function initPaint() {
  if (paintInited) return;
  paintInited = true;
  var wrap = document.getElementById('paintEmbedWrap');
  if (!wrap) return;
  var iframe = document.createElement('iframe');
  iframe.src = 'https://jspaint.app';
  iframe.setAttribute('allowfullscreen', '');
  iframe.setAttribute('allow', 'clipboard-read; clipboard-write; display-capture');
  wrap.appendChild(iframe);
}

/* ── Sounds ── */
var _SB = '../assets/audio/';
var _SND = { start: _SB + 'sitestart.mp3', button: _SB + 'sitebuttonclick.mp3', hover: _SB + 'text.mp3' };
var _soundsOn = true, _aC = {}, _ht = 0;
function _gA(k) { if (!_aC[k]) { var a = new Audio(_SND[k]); a.preload = 'auto'; _aC[k] = a; } return _aC[k]; }
function _playSound(k) {
  if (!_soundsOn) return;
  try { var c = _gA(k).cloneNode(); c.volume = (k === 'hover' ? .30 : .52); c.play().catch(function () {}); } catch (e) {}
}
function _toggleSound() {
  _soundsOn = !_soundsOn;
  var b = document.getElementById('soundToggle');
  if (b) { b.textContent = _soundsOn ? 'Sounds: On' : 'Sounds: Off'; b.classList.toggle('off', !_soundsOn); }
  sessionStorage.setItem('_soundsOn', String(_soundsOn));
}
function _iI(el) {
  if (!el || el === document.body) return false;
  var t = el.tagName;
  if (t === 'BUTTON' || t === 'A' || t === 'SELECT') return true;
  if (t === 'INPUT' && el.type !== 'range') return true;
  var cs = window.getComputedStyle(el);
  return cs && cs.cursor === 'pointer';
}
document.addEventListener('DOMContentLoaded', function () {
  if (sessionStorage.getItem('_soundsOn') === 'false') {
    _soundsOn = false;
    var b = document.getElementById('soundToggle');
    if (b) { b.textContent = 'Sounds: Off'; b.classList.add('off'); }
  }
  if (!sessionStorage.getItem('_siteStartPlayed')) {
    sessionStorage.setItem('_siteStartPlayed', '1');
    setTimeout(function () { _playSound('start'); }, 700);
  }
  document.getElementById('soundToggle').addEventListener('click', _toggleSound);
  document.addEventListener('mouseover', function (e) {
    if (e.target.id === 'soundToggle') return;
    if (!_iI(e.target)) return;
    var n = Date.now();
    if (n - _ht < 120) return;
    _ht = n;
    _playSound('hover');
  }, { passive: true });
  document.addEventListener('click', function (e) {
    if (e.target.id === 'soundToggle') return;
    if (_iI(e.target)) _playSound('button');
  }, true);
});
</script>

</body>
