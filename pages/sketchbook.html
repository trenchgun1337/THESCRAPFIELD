<!DOCTYPE html>
<html lang="en">
<head>

<style>

  width: 100%; height: 600px;
  background: #000; overflow: hidden;
  display: block; border: none;
}

</head>
<body>
<div id="pageWrap">

  <div class="aero-topbar">
    <a class="aero-topbar-brand" href="index.html" title="Home">
      <img src="assets/images/watanagashilogo.png" alt="" class="aero-topbar-logo"
        onerror="this.style.display='none'">
      <span class="aero-topbar-title">Watanagashi Archive</span>
    </a>
    <nav class="aero-topbar-nav">
      <a href="index.html">
        <img src="https://frutigeraeroarchive.org/images/introduction.png" class="nav-icon" alt="">Introduction</a>
      <a href="music.html">
        <img src="https://frutigeraeroarchive.org/images/music.png" class="nav-icon" alt="">Music Player</a>
      <a href="videos.html">
        <img src="https://frutigeraeroarchive.org/images/videos.png" class="nav-icon" alt="">Video Player</a>
      <a href="sketchbook.html" class="active">
        <img src="https://frutigeraeroarchive.org/images/sketchbook.png" class="nav-icon" alt="">Sketchbook</a>
      <a href="community.html">
        <img src="https://frutigeraeroarchive.org/images/forum.png" class="nav-icon" alt="">Community</a>
      <a href="contact.html">
        <img src="https://frutigeraeroarchive.org/images/contact.png" class="nav-icon" alt="">Contact</a>
      <a href="resources.html">
        <img src="https://frutigeraeroarchive.org/images/resources.png" class="nav-icon" alt="">Resources</a>
    </nav>
  </div>

  <!-- JS Paint -->
  <div class="glass-box">
    <h2><span>JS Paint</span></h2>
    <div class="aero-inner" style="overflow:hidden">
      <div id="paintEmbedWrap"></div>
    </div>
  </div>

  <!-- Awarded Art -->
  <div class="glass-box">
    <h2 style="margin:0"><span>Awarded Art</span></h2>
    <div class="aero-inner" style="background:#000;padding:6px">
      <div id="galleryAwarded"></div>
    </div>
  </div>

  <!-- Gallery -->
  <div class="glass-box">
    <div style="display:flex;align-items:center;justify-content:space-between;position:relative">
      <h2 style="flex:1"><span>Gallery</span></h2>
      <div style="position:relative">
        <span id="galPlusBtn" title="Sort Options"
          style="cursor:pointer;font-size:17px;font-weight:bold;color:rgba(200,200,200,.55);padding:2px 8px;user-select:none;line-height:1;display:inline-block;background:var(--bar-grad);border:1px solid var(--bar-border-s);border-top-color:var(--bar-border-t);border-bottom-color:var(--bar-border-b);height:100%;align-self:stretch;display:flex;align-items:center;">+</span>
        <div id="galPlusPopup" style="display:none;position:absolute;right:0;top:100%;z-index:300;background:#050505;border:1px solid rgba(180,20,20,.4);min-width:180px;font-family:Tahoma,sans-serif;font-size:12px;padding:4px 0;">
          <div style="padding:4px 14px 2px;color:rgba(200,200,200,.5);font-size:10px;letter-spacing:1px;text-transform:uppercase;">Sort</div>
          <div id="galSortItems"></div>
        </div>
      </div>
    </div>
    <div class="styled-container aero-inner">
      <div id="galleryGrid" class="gi-grid"></div>
      <div id="galleryPager"></div>
    </div>
  </div>

</div>

<div class="bottom-util">
  <button class="bottom-util-btn" id="soundToggle" onclick="toggleUiSound()">Sounds: On</button>
  <button class="bottom-util-btn" onclick="window.location.href='preferences.html'">Preferences</button>
</div>

<!-- Gallery lightbox overlay (must be at body level) -->
<div class="gi-lb-overlay" id="giLbOverlay">
  <div class="gi-lb-box">
    <div class="gi-lb-titlebar">
      <span id="giLbTitle">Image</span>
      <div class="gi-lb-title-btns">
        <button class="gi-lb-close" id="giLbClose">x</button>
      </div>
    </div>
    <div class="gi-lb-imgarea">
      <button class="gi-lb-arrow gi-lb-prev" id="giLbPrev">&lt;</button>
      <div class="gi-lb-imgwrap"><img id="giLbImg" src="" alt=""></div>
      <button class="gi-lb-arrow gi-lb-next" id="giLbNext">&gt;</button>
    </div>
    <div class="gi-lb-bottom">
      <div class="gi-lb-desc" id="giLbDesc"></div>
      <div class="gi-lb-meta">
        <div class="gi-stars-row" id="giLbStars"></div>
        <span id="giLbCounter"></span>
      </div>
    </div>
  </div>
</div>

<script>
window._onGalleryRendered = function(count) {};
</script>
<script src="scripts/js/gallery.js"></script>
<script src="scripts/js/paint.js"></script>
<script>
const SOUND_BASE='assets/audio/';
const UI_SOUNDS={start:SOUND_BASE+'sitestart.mp3',button:SOUND_BASE+'sitebuttonclick.mp3',hover:SOUND_BASE+'text.mp3'};
let _uiSoundsOn=localStorage.getItem('_wa_sounds')!=='off';
const _uac={};
function _uga(k){if(!_uac[k]){const a=new Audio(UI_SOUNDS[k]);a.preload='auto';_uac[k]=a;}return _uac[k];}
function playUiSound(k){if(!_uiSoundsOn||!UI_SOUNDS[k])return;try{const c=_uga(k).cloneNode();c.volume=k==='hover'?0.30:0.52;c.play().catch(()=>{});}catch(e){}}
function toggleUiSound(){_uiSoundsOn=!_uiSoundsOn;localStorage.setItem('_wa_sounds',_uiSoundsOn?'on':'off');const b=document.getElementById('soundToggle');if(b){b.textContent=_uiSoundsOn?'Sounds: On':'Sounds: Off';b.classList.toggle('off',!_uiSoundsOn);}if(_uiSoundsOn)playUiSound('button');}
document.addEventListener('DOMContentLoaded',()=>{const b=document.getElementById('soundToggle');if(b&&!_uiSoundsOn){b.textContent='Sounds: Off';b.classList.add('off');}if(!sessionStorage.getItem('_siteStartPlayed')){sessionStorage.setItem('_siteStartPlayed','1');setTimeout(()=>playUiSound('start'),700);}});
</script>
</body>
</html>
