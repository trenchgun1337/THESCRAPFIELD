<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' data: blob: https: wss:;">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sketchbook &mdash; Watanagashi Archive</title>
<link rel="icon" type="image/x-icon" href="assets/images/favicon.ico">
<link rel="stylesheet" href="scripts/css/style.css">
</head>
<body>
<div id="pageWrap">

  <div class="aero-bar">
    <a href="pages/videos.html" class="aero-nav-btn" title="Back: Video Player">
      <img src="https://img1.picmix.com/output/stamp/thumb/9/6/4/8/2608469_0fb9f.png" alt="Back"
        onerror="this.outerHTML='&lt;span style=&quot;color:#bbb;font-size:24px;line-height:1;z-index:1&quot;&gt;&amp;#8249;&lt;/span&gt;'">
    </a>
    <span class="aero-bar-title">The Watanagashi Archive &mdash; Sketchbook</span>
    <a href="pages/community.html" class="aero-nav-btn" title="Next: Community">
      <img src="https://img1.picmix.com/output/stamp/thumb/9/6/4/8/2608469_0fb9f.png" alt="Next"
        style="transform:scaleX(-1)"
        onerror="this.outerHTML='&lt;span style=&quot;color:#bbb;font-size:24px;line-height:1;z-index:1&quot;&gt;&amp;#8250;&lt;/span&gt;'">
    </a>
  </div>

  <!-- JS Paint -->
  <div class="glass-box">
    <h2><span>JS Paint</span></h2>
    <div class="aero-inner" style="overflow:hidden">
      <div id="paintEmbedWrap"></div>
    </div>
  </div>

  <!-- Awarded Art -->
  <div class="glass-box">
    <div class="rights-bar" style="margin:0">Awarded Art</div>
    <div class="aero-inner" style="background:#000;padding:6px">
      <div id="galleryAwarded"></div>
    </div>
  </div>

  <!-- Gallery -->
  <div class="glass-box">
    <div style="display:flex;align-items:stretch">
      <h2 style="flex:1"><span>Gallery</span></h2>
      <div style="position:relative;display:flex;align-items:stretch">
        <span id="galPlusBtn" title="Sort Options"
          style="cursor:pointer;font-size:17px;font-weight:bold;color:rgba(200,200,200,.55);
                 padding:0 10px;user-select:none;display:flex;align-items:center;
                 background:var(--bar-grad);
                 border:1px solid var(--bar-border-s);
                 border-top-color:var(--bar-border-t);
                 border-bottom-color:var(--bar-border-b);
                 border-left:none;">+</span>
        <div id="galPlusPopup" style="display:none;position:absolute;right:0;top:100%;z-index:300;background:#050505;border:1px solid rgba(180,20,20,.4);min-width:180px;font-family:Tahoma,sans-serif;font-size:12px;padding:4px 0;">
          <div style="padding:4px 14px 2px;color:rgba(200,200,200,.45);font-size:10px;letter-spacing:1px;text-transform:uppercase;">Sort</div>
          <div id="galSortItems"></div>
        </div>
      </div>
    </div>
    <div class="styled-containers aero-inner">
      <div id="galleryGrid" class="gi-grid"></div>
      <div id="galleryPager"></div>
    </div>
  </div>

</div>

<!-- Lightbox (must be at body level) -->
<div class="gi-lb-overlay" id="giLbOverlay">
  <div class="gi-lb-box">
    <div class="gi-lb-titlebar">
      <span id="giLbTitle">Image</span>
      <div class="gi-lb-title-btns">
        <button class="gi-lb-close" id="giLbClose">x</button>
      </div>
    </div>
    <div class="gi-lb-imgarea">
      <button class="gi-lb-arrow gi-lb-prev" id="giLbPrev">&lt;</button>
      <div class="gi-lb-imgwrap"><img id="giLbImg" src="" alt=""></div>
      <button class="gi-lb-arrow gi-lb-next" id="giLbNext">&gt;</button>
    </div>
    <div class="gi-lb-bottom">
      <div class="gi-lb-desc" id="giLbDesc"></div>
      <div class="gi-lb-meta">
        <div class="gi-stars-row" id="giLbStars"></div>
        <span id="giLbCounter"></span>
      </div>
    </div>
  </div>
</div>

<div id="bottomUtil">
  <button class="bottom-btn wa-sound-toggle" onclick="toggleSound()">Sounds: On</button>
  <a href="preferences.html" class="bottom-btn">Preferences</a>
</div>

<div id="renaChan" style="position:fixed;bottom:0;right:0;width:250px;height:350px;background-image:url('assets/images/renaidle1.png');background-size:contain;background-repeat:no-repeat;background-position:bottom right;z-index:9999;cursor:pointer;"></div>

<script>
window._onGalleryRendered = function(count) {};
</script>
<script src="scripts/js/gallery.js"></script>
<script src="scripts/js/paint.js"></script>
<script src="scripts/js/sounds.js"></script>
<script src="scripts/js/codes.js"></script>
</body>
</html>
